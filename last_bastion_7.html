        ).join('')}
    </div>
    <button onclick="launchMission(${instanceId})" style="width:100%;margin-top:12px;padding:10px;background:var(--green-dim);border:1px solid var(--green);color:var(--green-bright);font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:2px;">
      🚀 GÖREVİ BAŞLAT
    </button>` : '<div style="color:var(--amber);font-size:11px;text-align:center;padding:10px;">Görev devam ediyor...</div>'}
  `;
  document.getElementById('modal-title').textContent = mission.name.toUpperCase();
  document.getElementById('modal-subtitle').textContent = `GÖREV · Risk ${Math.floor(mission.risk*100)}%`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('show');

  // temp assignment tracking
  window._missionAssignments = window._missionAssignments || {};
  window._missionAssignments[instanceId] = [];
}

function toggleMissionAssign(instanceId, personId, el) {
  window._missionAssignments = window._missionAssignments || {};
  window._missionAssignments[instanceId] = window._missionAssignments[instanceId] || [];
  const arr = window._missionAssignments[instanceId];
  const idx = arr.indexOf(personId);
  const icon = document.getElementById(`assign-${instanceId}-${personId}`);
  if (idx >= 0) {
    arr.splice(idx, 1);
    if (icon) icon.textContent = '⬜';
  } else {
    arr.push(personId);
    if (icon) icon.textContent = '✅';
  }
}

function launchMission(instanceId) {
  const mission = STATE.missions.available.find(m => m.instanceId == instanceId);
  if (!mission) return;
  const assigned = (window._missionAssignments?.[instanceId] || []);
  if (assigned.length < mission.minPeople) {
    showNotification(`En az ${mission.minPeople} kişi gerekli!`, true); return;
  }
  // Remove from available, add to active
  STATE.missions.available = STATE.missions.available.filter(m => m.instanceId != instanceId);
  mission.assignedPeople = assigned;
  mission.daysLeft = mission.duration;
  // Mark people as on mission
  assigned.forEach(pid => {
    const p = getPersonById(pid);
    if (p) { p.onMission = instanceId; p.location = 'GÖREV'; }
  });
  STATE.missions.active.push(mission);
  addLog(`🚀 Görev başladı: ${mission.name} (${assigned.length} kişi)`, 'success');
  showNotification(`🚀 ${mission.name} başladı!`, false);
  closeModal();
  updateUI();
  renderMissions();
}

function processMissions() {
  STATE.missions.active.forEach((mission, idx) => {
    mission.daysLeft--;
    if (mission.daysLeft <= 0) {
      completeMission(mission);
      STATE.missions.active.splice(idx, 1);
    }
  });
  // Generate new missions if pool is low
  if (STATE.missions.available.length < 2) generateMissions();
}

function completeMission(mission) {
  const results = [];
  let losses = 0;

  mission.assignedPeople.forEach(pid => {
    const p = getPersonById(pid);
    if (!p) return;
    p.onMission = null;
    p.location = 'barracks';

    // Risk check per person
    if (Math.random() < mission.risk) {
      const fate = Math.random();
      if (fate < 0.4) {
        // Death
        STATE.people = STATE.people.filter(x => x.id !== p.id);
        addLog(`💀 ${p.name} görevde hayatını kaybetti: ${mission.name}`, 'danger');
        losses++;
        // Grief for partner/spouse
        const partner = p.spouseId ? getPersonById(p.spouseId) : null;
        if (partner) {
          partner.happiness = clamp((partner.happiness||50) - 30, 0, 100);
          STATE.social.morale = clamp(STATE.social.morale - 10, 0, 100);
          addLog(`💔 ${partner.name} eşini kaybetti. Üste yas var.`, 'warning');
        }
      } else {
        // Injury
        p.health = clamp(p.health - randInt(20, 40), 5, 100);
        addLog(`🩹 ${p.name} görevden yaralı döndü.`, 'warning');
      }
    }
  });

  // Collect rewards
  const R = mission.rewards;
  const summary = [];
  if (R.food) { const v = randInt(...R.food); STATE.resources.food += v; summary.push('+'+v+'🍖'); }
  if (R.parts) { const v = randInt(...R.parts); STATE.resources.parts += v; summary.push('+'+v+'🔧'); }
  if (R.caps) { const v = randInt(...R.caps); STATE.resources.caps += v; summary.push('+'+v+'🪙'); }
  if (R.meds) { const v = randInt(...R.meds); STATE.resources.meds += v; summary.push('+'+v+'💊'); }
  if (R.energy) { const v = randInt(...R.energy); STATE.resources.energy += v; summary.push('+'+v+'🔋'); }

  if (mission.givesSurvivor && Math.random() < 0.7) {
    const newSurv = generateSurvivor();
    newSurv.location = 'barracks';
    if (STATE.people.length < STATE.base.maxPop) {
      STATE.people.push(newSurv);
      summary.push(`+${newSurv.name}👤`);
    } else {
      STATE.gate.queue.push(newSurv);
      summary.push(`${newSurv.name} kapıda!👤`);
    }
  }

  addLog(`✅ Görev tamamlandı: ${mission.name} — ${summary.join(' ')} ${losses>0?'⚠️'+losses+' kayıp':''}`, losses > 0 ? 'warning' : 'success');
  showNotification(`✅ ${mission.name} tamam! ${summary.slice(0,3).join(' ')}`, losses > 0);
  STATE.missions.completed.push({ ...mission, completedDay: STATE.day });
  updateUI();
}

function renderMissions() {
  const el = document.getElementById('missions-list');
  if (!el) return;
  const all = [...STATE.missions.available.map(m => ({...m, status:'available'})),
               ...STATE.missions.active.map(m => ({...m, status:'active'}))];

  if (all.length === 0) {
    el.innerHTML = '<div style="font-size:10px;color:var(--text-dim);">Görev yok. Sonraki güne geç.</div>';
    return;
  }
  el.innerHTML = all.map(m => `
    <div class="mission-card ${m.status==='active'?'active':''}" onclick="showMissionDetail(${m.instanceId})">
      <div class="mission-header">
        <span class="mission-icon">${m.icon}</span>
        <span class="mission-name">${m.name}</span>
        <span class="mission-timer">${m.status==='active'?m.daysLeft+'g kaldı':m.duration+'g'}</span>
      </div>
      <div class="mission-desc">${m.desc}</div>
      <div class="mission-crew">${m.status==='active'
        ? '👥 '+m.assignedPeople.length+' kişi görevde'

      }</div>
    </div>
  `).join('');
}

// ==================== NIGHT RAID SYSTEM ====================
function checkNightRaid() {
  // Raid chance increases over days, reduced by walls and guards
  const guards = STATE.people.filter(p => p.trait === 'ASKER' || p.trait === 'GÜVENLİK').length;
  const wallDef = 30 + STATE.base.upgrades.walls * 15 + (STATE.activities.traps||0) * 5;
  const raidChance = clamp((STATE.day * 3 + STATE.social.tensionLevel * 0.1) - wallDef * 0.5 - guards * 5, 5, 60) / 100;

  if (Math.random() < raidChance) {
    const strength = randInt(STATE.day * 2, STATE.day * 5 + 20);
    STATE.nightRaid.pending = true;
    STATE.nightRaid.raidStrength = strength;
    document.getElementById('night-raid-btn').style.display = '';
    addLog(`🌙 BASKINI TESPİT EDİLDİ! ${strength} güçlük seviyesinde düşman yaklaşıyor!`, 'danger');
    showNotification('🌙 GECE BASKINI! Savunmaya geç!', true);
    addSocialAlert(`🌙 Gece baskını geliyor! Savunma hazırlıklarını tamamla!`, 'raid', () => showNightRaidModal());
  }
}

function showNightRaidModal() {
  const strength = STATE.nightRaid.raidStrength;
  const guards = STATE.people.filter(p => p.trait === 'ASKER' || p.trait === 'GÜVENLİK').length;
  const wallLevel = STATE.base.upgrades.walls;
  const traps = STATE.activities.traps || 0;
  const defense = 30 + wallLevel * 15 + guards * 10 + traps * 5;

  const defenseRatio = defense / Math.max(1, strength);
  let outcome = defenseRatio > 1.2 ? 'ZAFER' : defenseRatio > 0.7 ? 'YARA ALACAKSINIZ' : 'YENILGI TEHLİKESİ';
  let outcomeColor = defenseRatio > 1.2 ? 'var(--green)' : defenseRatio > 0.7 ? 'var(--amber)' : 'var(--red)';

  const body = `
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:12px;">
      Düşman kuvvetleri üsse yaklaşıyor. Savunma pozisyonunu değerlendir.
    </div>
    <div class="stat-row"><span class="stat-label">DÜŞMAN GÜCÜ</span><span class="stat-value" style="color:var(--red)">${strength}</span></div>
    <div class="stat-row"><span class="stat-label">SAVUNMA GÜCÜ</span><span class="stat-value" style="color:var(--green)">${Math.floor(defense)}</span></div>
    <div class="stat-row"><span class="stat-label">MUHAFIZlar</span><span class="stat-value">${guards} kişi</span></div>
    <div class="stat-row"><span class="stat-label">DUVAR SEVİYE</span><span class="stat-value">Lv.${wallLevel}</span></div>
    <div class="stat-row"><span class="stat-label">TUZAKLAR</span><span class="stat-value">${traps} adet</span></div>
    <div style="margin:12px 0;font-family:'Oswald',sans-serif;font-size:16px;color:${outcomeColor};letter-spacing:2px;">
      TAHMİN: ${outcome}
    </div>
    <div class="decision-grid">
      <button class="decision-btn accept" onclick="resolveRaid('defend');closeModal()">
        <span class="d-icon">🛡️</span>
        SAVUN<br><span style="font-size:9px">Tüm kuvvetlerle savaş</span>
      </button>
      <button class="decision-btn quarantine" onclick="resolveRaid('sneak');closeModal()">
        <span class="d-icon">🌑</span>
        GİZLEN<br><span style="font-size:9px">Kaçınmaya çalış</span>
      </button>
      <button class="decision-btn steal" onclick="resolveRaid('negotiate');closeModal()">
        <span class="d-icon">🤝</span>
        PAZARLIK<br><span style="font-size:9px">Kaynak ver, barış al</span>
      </button>
      <button class="decision-btn execute" onclick="resolveRaid('counterattack');closeModal()">
        <span class="d-icon">⚔️</span>
        KARŞI SALDIRI<br><span style="font-size:9px">Yüksek risk, yüksek kazanç</span>
      </button>
    </div>
  `;

  document.getElementById('modal-title').textContent = '🌙 GECE BASKINI';
  document.getElementById('modal-subtitle').textContent = `DÜŞMAN GÜCÜ: ${strength} · SAVUNMAN: ${Math.floor(defense)}`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('show');
}

function resolveRaid(strategy) {
  const strength = STATE.nightRaid.raidStrength;
  const guards = STATE.people.filter(p => p.trait === 'ASKER' || p.trait === 'GÜVENLİK').length;
  const defense = 30 + STATE.base.upgrades.walls * 15 + guards * 10 + (STATE.activities.traps||0) * 5;
  const roll = Math.random();

  let msg = '';
  let success = false;

  if (strategy === 'defend') {
    success = defense >= strength * 0.8 || roll < 0.5;
    if (success) {
      msg = `🛡️ SAVUNMA BAŞARILI! Düşman geri çekildi.`;
      STATE.resources.caps += randInt(5, 15);
      STATE.social.morale = clamp(STATE.social.morale + 15, 0, 100);
    } else {
      msg = `💥 SAVUNMA YIKILDI! Üse zarar verildi.`;
      STATE.resources.food = Math.max(0, STATE.resources.food - randInt(10, 25));
      STATE.resources.parts = Math.max(0, STATE.resources.parts - randInt(5, 15));
      STATE.people.forEach(p => { if (Math.random() < 0.3) p.health = clamp(p.health - randInt(15,35), 0, 100); });
      // Possible death
      if (STATE.people.length > 0 && Math.random() < 0.4) {
        const casualty = randFrom(STATE.people);
        STATE.people = STATE.people.filter(p => p.id !== casualty.id);
        addLog(`💀 ${casualty.name} baskında hayatını kaybetti.`, 'danger');
      }
    }
  } else if (strategy === 'sneak') {
    success = roll < 0.6;
    msg = success ? '🌑 Gizlenme başarılı, düşman geçip gitti.' : '💥 Tespitit edildik! Kısmi hasar.';
    if (!success) { STATE.resources.food = Math.max(0, STATE.resources.food - randInt(5,12)); }
  } else if (strategy === 'negotiate') {
    const cost = randInt(8, 20);
    STATE.resources.food = Math.max(0, STATE.resources.food - cost);
    STATE.resources.caps = Math.max(0, STATE.resources.caps - randInt(5, 10));
    msg = `🤝 Pazarlık yapıldı. ${cost} yiyecek verildi, düşman çekildi.`;
    success = true;
  } else if (strategy === 'counterattack') {
    success = guards >= 2 && (defense > strength || roll < 0.4);
    if (success) {
      msg = `⚔️ KARŞI SALDIRI BAŞARILI! Düşman bozguna uğratıldı!`;
      STATE.resources.caps += randInt(15, 30);
      STATE.resources.parts += randInt(5, 12);
      STATE.social.morale = clamp(STATE.social.morale + 25, 0, 100);
    } else {
      msg = `⚔️ Karşı saldırı başarısız! Ağır kayıp verildi!`;
      if (STATE.people.length > 0) {
        const casualty = randFrom(STATE.people.filter(p => p.trait==='ASKER'||p.trait==='GÜVENLİK') || STATE.people);
        if (casualty) {
          STATE.people = STATE.people.filter(p => p.id !== casualty.id);
          addLog(`💀 ${casualty.name} karşı saldırıda şehit düştü.`, 'danger');
        }
      }
      STATE.resources.food = Math.max(0, STATE.resources.food - randInt(15, 30));
    }
  }

  addLog(msg, success ? 'success' : 'danger');
  showNotification(msg.substring(0, 50), !success);

  // Consume traps
  if (STATE.activities.traps > 0 && strategy === 'defend') {
    STATE.activities.traps = Math.max(0, STATE.activities.traps - randInt(0,2));
  }

  STATE.nightRaid.pending = false;
  STATE.nightRaid.raidStrength = 0;
  document.getElementById('night-raid-btn').style.display = 'none';
  updateUI();
}

  if (!STATE.farmCrops) return;
  STATE.farmCrops.forEach(c => {

    if (c.daysLeft <= 0) addLog(`✅ ${c.name} hasatı tamamlandı.`, 'success');
  });
  STATE.farmCrops = STATE.farmCrops.filter(c => c.daysLeft > 0);
}

function showPoliceTraining() {
  const secWorkers = (STATE.base.assignments.security || [])
    .map(id => STATE.people.find(p => String(p.id) === String(id))).filter(Boolean);
  const instructor = secWorkers.find(p => p.skills.combat >= 60 && p.skills.social >= 60);
  if (!instructor) { showNotification('Uygun eğitmen yok!', true); return; }

  // Trainable: free (no assignment), not imprisoned, not child, hasn't maxed training
  const trainable = STATE.people.filter(p =>
    !getAssignedBuilding(p.id) &&
    !p.isChild &&
    !p.onMission &&
    (p.trainingCount || 0) < 3 &&
    p.id !== instructor.id
  );

  const body = `
    <div style="padding:8px;background:var(--bg2);border:1px solid var(--border);margin-bottom:12px;font-size:10px;">
      <div style="font-family:'Oswald',sans-serif;font-size:13px;color:var(--green-bright);margin-bottom:4px;">
        ${instructor.emoji} ${instructor.name} — EĞİTMEN
      </div>
      <div style="color:var(--text-dim);">Savaş: <b style="color:var(--green)">${instructor.skills.combat}</b> · Sosyal: <b style="color:var(--green)">${instructor.skills.social}</b></div>
      <div style="font-size:9px;color:var(--text-dim);margin-top:4px;">Eğitim süresi: 30 dakika · Max eğitim/kişi: 3 kez</div>
    </div>
    <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px;">EĞİTİLECEK KİŞİ SEÇ:</div>
    ${trainable.length === 0
      ? '<div style="font-size:10px;color:var(--text-dim);">Eğitilebilecek uygun kişi yok. (Tüm kişiler atanmış, görevde veya max eğitim almış)</div>'
      : trainable.map(p => {
          const gain = calcTrainingGain(instructor, p);
          return `
            <div class="assignment-slot" onclick="startPoliceTraining('${instructor.id}','${p.id}');closeModal();">
              <span class="slot-emoji">${p.emoji}</span>
              <span class="slot-name">${p.name} <span style="font-size:9px;color:var(--text-dim)">${p.trait}</span></span>
              <span style="font-size:9px;color:var(--text-dim)">Savaş: ${p.skills.combat}</span>
              <span style="font-size:9px;color:var(--green)">+${gain} beklenen</span>
              <span style="font-size:8px;color:var(--text-dim)">(${p.trainingCount||0}/3)</span>
            </div>`;
        }).join('')}
  `;
  document.getElementById('modal-title').textContent = '🎓 POLİS EĞİTİMİ';
  document.getElementById('modal-subtitle').textContent = `${instructor.name} eğitim veriyor`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('show');
}

function calcTrainingGain(instructor, trainee) {
  // Max gain = 10 (at 100/100 instructor). Formula: (combat+social)/20
  const instructorPower = (instructor.skills.combat + instructor.skills.social) / 200; // 0-1
  const maxGain = 10;
  return Math.max(1, Math.round(instructorPower * maxGain));
}

function startPoliceTraining(instructorId, traineeId) {
  const instructor = STATE.people.find(p => String(p.id) === String(instructorId));
  const trainee = STATE.people.find(p => String(p.id) === String(traineeId));
  if (!instructor || !trainee) return;

  const gain = calcTrainingGain(instructor, trainee);

  // Start a timed training — 30 real seconds (for testing; in production could be 30 min)
  STATE._trainingSession = {
    instructorId, traineeId,
    gain,
    startTime: Date.now(),
    durationMs: 30 * 1000, // 30 seconds real time (test mode)
    instructorName: instructor.name,
    traineeName: trainee.name,
  };
  trainee.onTraining = true;

  addLog(`🎓 ${trainee.name} eğitime başladı (eğitmen: ${instructor.name}). 30 saniye...`, 'success');
  showNotification(`🎓 Eğitim başladı: ${trainee.name}`, false);
  updateUI();
}

function checkTrainingCompletion() {
  if (!STATE._trainingSession) return;
  const s = STATE._trainingSession;
  const elapsed = Date.now() - s.startTime;
  if (elapsed >= s.durationMs) {
    const trainee = STATE.people.find(p => String(p.id) === String(s.traineeId));
    if (trainee) {
      trainee.skills.combat = clamp(trainee.skills.combat + s.gain, 0, 100);
      trainee.trainingCount = (trainee.trainingCount || 0) + 1;
      trainee.onTraining = false;
      addLog(`✅ Eğitim bitti! ${trainee.name} savaş puanı +${s.gain} → ${trainee.skills.combat}`, 'success');
      showNotification(`✅ ${trainee.name} eğitimini tamamladı! +${s.gain} savaş`, false);
    }
    STATE._trainingSession = null;
    renderBuildingAssignments();
    renderBasePeopleList();
  }
}

  const freePeople = STATE.people.filter(p => !p.isChild && !p.onMission);
  const skillKey = buildingDef.skill;

  const body = `
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:10px;line-height:1.7;">${buildingDef.desc}</div>
    <div style="font-size:9px;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px;">KİŞİ SEÇ (tıkla → ata):</div>
    ${freePeople.length === 0
      ? '<div style="font-size:10px;color:var(--text-dim);">Uygun kişi yok.</div>'
      : freePeople.sort((a,b) => (b.skills[skillKey]||0)-(a.skills[skillKey]||0)).map(p => {
          const assigned = getAssignedBuilding(p.id);
          const skillVal = p.skills[skillKey] || 0;
          const skillColor = skillVal >= 65 ? 'var(--green)' : skillVal >= 35 ? 'var(--amber)' : 'var(--red)';
          const isCurrentlyAssigned = String(STATE.base.assignments[buildingId]||[]).includes(String(p.id)) || (STATE.base.assignments[buildingId]||[]).map(String).includes(String(p.id));
          return `
            <div class="assignment-slot" onclick="assignPersonToBuilding('${p.id}','${buildingId}');closeModal();updateUI();"
                 style="${isCurrentlyAssigned?'border-color:var(--green-bright);background:rgba(122,179,42,0.08)':''}">
              <span class="slot-emoji">${p.emoji}</span>
              <span class="slot-name">${p.name} <span style="font-size:9px;color:var(--text-dim)">${p.trait}</span></span>
              <span style="font-size:9px;color:${skillColor}">${buildingDef.skillLabel(skillVal)}</span>
              <span class="slot-score" style="color:${skillColor}">${skillVal}</span>
              ${assigned ? `<span style="font-size:9px;color:var(--amber)">[${BUILDING_LABELS[assigned]?.name||assigned}]</span>` : ''}
              ${isCurrentlyAssigned ? '<span style="color:var(--green);font-size:10px">✓ ATANMIŞ</span>' : ''}
            </div>`;
        }).join('')}
    <div style="margin-top:10px;">
      <button onclick="unassignAll('${buildingId}');closeModal();updateUI();"
              style="width:100%;padding:8px;background:var(--red-dim);border:1px solid var(--red);color:var(--red);font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;">
        ✕ TÜM ATAMALARI KALDIR
      </button>
    </div>
  `;

  document.getElementById('modal-title').textContent = buildingDef.icon + ' ' + buildingDef.name;
  document.getElementById('modal-subtitle').textContent = `Beceri: ${skillKey.toUpperCase()} · Atama Yönetimi`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('show');
}

function unassignAll(buildingId) {
  STATE.base.assignments[buildingId] = [];
}

function showPersonDetail(personId) {
  // Find person in any group

  const inBase = !!p;
  if (!p) p = STATE.quarantined.find(x => String(x.id) === String(personId));
  const inQuarantine = !inBase && !!p;
  if (!p) return;

  const building = getAssignedBuilding(p.id);
  const partner = p.spouseId ? getPersonById(p.spouseId) : p.partnerId ? getPersonById(p.partnerId) : null;
  const children = (p.childrenIds||[]).map(id => getPersonById(id)).filter(Boolean);

  // Infection progression display
  let infectionWarning = '';
  if (p.infected) {
    const daysLeft = 2 - (p.infectedDays || 0);
    infectionWarning = `
      <div style="padding:8px;background:rgba(196,58,42,0.15);border:1px solid var(--red);margin-bottom:10px;font-size:10px;">
        <div style="color:var(--red);font-family:'Oswald',sans-serif;font-size:13px;margin-bottom:4px;">🦠 ENFEKSİYON - ÇÖZÜM YOK</div>
        <div style="color:var(--text-dim);">Bu kişi enfekte. Klinik tedavi edemez. ${daysLeft <= 0 ? '<b style="color:var(--red)">BUGÜN DÖNÜŞÜYOR!</b>' : `~${daysLeft} gün içinde dönüşecek.`}</div>
        <div style="color:var(--text-dim);margin-top:4px;font-size:9px;">Başkalarına bulaşabilir. Acil karar gerekiyor.</div>
      </div>`;
  }

  // Infected person in base: show emergency actions
  const showEmergencyActions = p.infected && inBase;

  const body = `
    <div style="display:flex;gap:12px;margin-bottom:12px;align-items:flex-start;">
      <div style="font-size:48px;background:var(--bg2);border:1px solid ${p.infected?'var(--red)':p.suspicious?'var(--amber)':'var(--border)'};padding:8px;flex-shrink:0;">${p.emoji}</div>
      <div style="flex:1;">
        <div style="font-family:'Oswald',sans-serif;font-size:18px;color:var(--text-bright);">${p.name} <span style="font-size:12px;color:var(--text-dim)">${p.male?'♂':'♀'} ${p.age}y</span></div>
        <div style="font-size:11px;color:var(--amber);margin-top:2px;">${p.trait} · <span style="color:var(--text-dim)">${p.personality}</span></div>
        <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">
          ${p.infected?'<span class="chip red">🦠 ENFEKTELİ</span>':''}
          ${p.suspicious?'<span class="chip amber">👁 ŞÜPHELİ</span>':''}
          ${p.spouseId?'<span class="chip" style="border-color:#e05080;color:#e05080">💍 EVLİ</span>':''}
          ${children.length>0?`<span class="chip blue">👶 ${children.length} çocuk</span>`:''}
          ${building?`<span class="chip green">${BUILDING_LABELS[building].icon} ${BUILDING_LABELS[building].name}</span>`:'<span class="chip" style="border-color:var(--border);color:var(--text-dim)">🏠 Serbest</span>'}
          ${(p.trainingCount||0)>0?`<span class="chip" style="border-color:var(--green-dim);color:var(--green-dim)">🎓 ${p.trainingCount}/3</span>`:''}
        </div>
      </div>
    </div>

    ${infectionWarning}

    ${skillBar('SAĞLIK', p.health, healthLabel, p.health>=75?'var(--green)':p.health>=40?'var(--amber)':'var(--red)')}
    ${skillBar('MORALİ', p.happiness||50, v=>v>=75?'Neşeli':v>=55?'İyi':v>=35?'Karamsar':v>=15?'Çökmüş':'Patlama noktasında', (p.happiness||50)>=50?'var(--green)':(p.happiness||50)>=25?'var(--amber)':'var(--red)')}
    ${skillBar('SAVAŞ', p.skills.combat, combatLabel)}
    ${skillBar('TIP', p.skills.medical, medicalLabel)}
    ${skillBar('ATÖLYE', p.skills.workshop, workshopLabel)}
    ${skillBar('TARIM', p.skills.farming, v=>v>=60?'Çiftçi':v>=30?'Bahçıvan':'Acemi')}
    ${skillBar('SOSYAL', p.skills.social, socialLabel)}

    ${partner ? `<div class="stat-row"><span class="stat-label">PARTNER</span><span class="stat-value">${partner.emoji} ${partner.name}</span></div>` : ''}
    ${children.length>0?`<div class="stat-row"><span class="stat-label">ÇOCUKLAR</span><span class="stat-value">${children.map(c=>c.emoji+c.name).join(', ')}</span></div>`:''}

    ${showEmergencyActions ? `
      <div class="section-divider" style="color:var(--red);">⚠️ ACİL AKSİYON</div>
      <div class="decision-grid" style="grid-template-columns:1fr 1fr 1fr;">
        <button class="decision-btn quarantine" onclick="movePersonToQuarantine('${p.id}');closeModal();">
          <span class="d-icon">🔒</span>KARANTİNA<span style="font-size:8px">Izole et</span>
        </button>
        <button class="decision-btn prison" onclick="movePersonToPrison('${p.id}');closeModal();">
          <span class="d-icon">⚠️</span>HAPSE AT<span style="font-size:8px">Kilitle</span>
        </button>
        <button class="decision-btn execute" onclick="executeBasePerson('${p.id}');closeModal();">
          <span class="d-icon">💀</span>ÖLDÜR<span style="font-size:8px">Dönüşümü engelle</span>
        </button>
      </div>
    ` : `
      <div class="section-divider">ATAMA DEĞİŞTİR</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
        ${Object.entries(BUILDING_LABELS).map(([bid, bl]) => `
          <button onclick="assignPersonToBuilding('${p.id}','${bid}');closeModal();renderBuildingAssignments();renderBasePeopleList();"
                  style="padding:6px;background:${building===bid?'var(--green-dim)':'var(--bg2)'};border:1px solid ${building===bid?'var(--green)':'var(--border)'};color:${building===bid?'var(--green-bright)':'var(--text)'};font-family:'Share Tech Mono',monospace;font-size:9px;cursor:pointer;">
            ${bl.icon} ${bl.name} ${building===bid?'✓':''}
          </button>`).join('')}
        <button onclick="assignPersonToBuilding('${p.id}',null);closeModal();renderBuildingAssignments();renderBasePeopleList();"
                style="padding:6px;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:9px;cursor:pointer;">
          🏠 Serbest
        </button>
      </div>
    `}
  `;

  document.getElementById('modal-title').textContent = p.name.toUpperCase();
  document.getElementById('modal-subtitle').textContent = `${p.trait} · ${p.personality} · Gün ${p.daysInBase||0}`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('show');
}

function movePersonToQuarantine(personId) {
  const idx = STATE.people.findIndex(p => String(p.id) === String(personId));
  if (idx === -1) return;
  const p = STATE.people.splice(idx, 1)[0];
  p.location = 'quarantine';
  STATE.quarantined.push(p);
  assignPersonToBuilding(p.id, null);
  addLog(`🔒 ${p.name} karantinaya alındı (enfekte).`, 'warning');
  showNotification(`🔒 ${p.name} karantinada`, false);
  renderBasePeopleList(); updateUI();
}

function movePersonToPrison(personId) {
  const idx = STATE.people.findIndex(p => String(p.id) === String(personId));
  if (idx === -1) return;
  const p = STATE.people.splice(idx, 1)[0];
  p.location = 'prison';
  STATE.imprisoned.push(p);
  assignPersonToBuilding(p.id, null);
  addLog(`⚠️ ${p.name} hücreye konuldu (enfekte).`, 'warning');
  showNotification(`⚠️ ${p.name} hücrede`, false);
  renderBasePeopleList(); updateUI();
}

function executeBasePerson(personId) {
  const idx = STATE.people.findIndex(p => String(p.id) === String(personId));
  if (idx === -1) return;
  const p = STATE.people.splice(idx, 1)[0];
  assignPersonToBuilding(p.id, null);
  STATE.total_executed++;
  // Morale hit but prevents spread
  STATE.social.morale = clamp(STATE.social.morale - 8, 0, 100);
  // Grief for spouse
  if (p.spouseId) {
    const spouse = getPersonById(p.spouseId);
    if (spouse) { spouse.happiness = clamp((spouse.happiness||50) - 30, 0, 100); }
  }
  addLog(`💀 ${p.name} öldürüldü. Dönüşüm engellendi. Moral düştü.`, 'danger');
  showNotification(`💀 ${p.name} öldürüldü`, true);
  renderBasePeopleList(); updateUI();
}



// ==================== PRISON ESCAPE SYSTEM ====================
function calcEscapeRisk(prisoner) {
  // Base roll needed: 20 to escape (1-20 dice)
  let modifier = 0;

  // Combat bonus
  if (prisoner.skills.combat >= 90) modifier += 3;
  else if (prisoner.skills.combat >= 80) modifier += 2;
  else if (prisoner.skills.combat >= 60) modifier += 1;

  // Guard disadvantage
  const guards = STATE.base.assignments.security
    .map(id => STATE.people.find(p => String(p.id) === String(id)))
    .filter(Boolean);
  const guardAvgCombat = guards.length > 0
    ? guards.reduce((s, g) => s + g.skills.combat, 0) / guards.length : 0;

  if (guardAvgCombat > prisoner.skills.combat) modifier -= 2;

  // Outnumbered guards
  if (guards.length < STATE.imprisoned.length) modifier += 3;

  return 20 - modifier; // number needed to roll or above to escape
}

function processPrisonEscapes() {
  const escapeResults = [];

  STATE.imprisoned.forEach(prisoner => {
    const needed = calcEscapeRisk(prisoner);
    const roll = randInt(1, 20);
    if (roll >= needed) {
      escapeResults.push({ prisoner, roll });
    }
  });

  if (escapeResults.length > 0) {
    // First successful escape
    const first = escapeResults[0];
    doEscape(first.prisoner);

    // Cascade: remaining prisoners get +1
    if (escapeResults.length > 1) {
      escapeResults.slice(1).forEach(r => {
        const needed = calcEscapeRisk(r.prisoner);
        if (r.roll + 1 >= needed) doEscape(r.prisoner);
      });
    }
  }
}

function doEscape(prisoner) {
  STATE.imprisoned = STATE.imprisoned.filter(p => p.id !== prisoner.id);
  prisoner.location = 'barracks';
  prisoner.suspicious = true;
  prisoner.danger = 90;
  prisoner.personality = 'SALDIRGAN';

  if (Math.random() < 0.5) {
    // Escaped into the wild
    addLog(`🚨 ${prisoner.name} hapisten KAÇTI! Üste saldırı gerçekleşti!`, 'danger');
    STATE.people.forEach(p => { if (Math.random() < 0.25) p.health = clamp(p.health - randInt(5,20), 0, 100); });
    STATE.resources.food = Math.max(0, STATE.resources.food - randInt(3, 10));
    showNotification(`🚨 KAÇIŞ! ${prisoner.name} hapisten kaçtı!`, true);
    addSocialAlert(`🚨 ${prisoner.name} hapisten kaçtı! Emniyet açığı var!`, 'escape', null);
  } else {
    // Escapes and hides in base — becomes a hidden threat
    STATE.people.push(prisoner);
    addLog(`🚨 ${prisoner.name} hapisten kaçıp üste saklandı! İzleyin!`, 'danger');
    showNotification(`🚨 ${prisoner.name} üste gizleniyor!`, true);
  }
}

// ==================== INFECTION PROGRESSION (Walking Dead) ====================
function processInfectionProgression() {
  const allPeople = [...STATE.people, ...STATE.quarantined];
  const toKill = [];

  allPeople.forEach(p => {
    if (!p.infected) return;
    p.infectedDays = (p.infectedDays || 0) + 1;

    // Health deteriorates rapidly
    p.health = clamp(p.health - randInt(15, 30), 0, 100);
    p.happiness = clamp((p.happiness||50) - 20, 0, 100);

    if (p.infectedDays >= 2 || p.health <= 0) {
      toKill.push(p.id);
      addLog(`☠️ ${p.name} dönüştü ve öldürüldü! Üs güvenliği tehdit altında.`, 'danger');
      showNotification(`☠️ ${p.name} DÖNÜŞTÜ!`, true);

      // Spread to nearby people with low health (in same location)
      if (!p.location || p.location === 'barracks') {
        STATE.people.filter(x => x.id !== p.id && !x.infected && x.health < 50 && Math.random() < 0.3).forEach(x => {
          x.infectionPending = true;
          addLog(`🦠 ${x.name}'a bulaşma riski var!`, 'warning');
        });
      }

      // Grief for spouse
      if (p.spouseId) {
        const spouse = getPersonById(p.spouseId);
        if (spouse) { spouse.happiness = clamp((spouse.happiness||50) - 40, 0, 100); }
      }
      STATE.social.morale = clamp(STATE.social.morale - 15, 0, 100);
      STATE.social.tensionLevel = clamp(STATE.social.tensionLevel + 25, 0, 100);
    }
  });

  if (toKill.length > 0) {
    STATE.people = STATE.people.filter(p => !toKill.includes(p.id));
    STATE.quarantined = STATE.quarantined.filter(p => !toKill.includes(p.id));
    toKill.forEach(id => assignPersonToBuilding(id, null));
  }
}

// Newcomers at gate should have lower health
function generateSurvivorWithLowHealth() {
  const s = generateSurvivor();
  // Newcomers are tired and wounded — health 20-60
  s.health = randInt(20, 60);
  return s;
}

function init() {
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Spawn 5 starting survivors with MODEST stats
  const startingTraits = ['DOKTOR','ASKER','MÜHENDİS','ÇIFTÇI','GÜVENLİK'];
  startingTraits.forEach((trait) => {
    const s = generateSurvivor();
    s.trait = trait;
    s.location = 'barracks';
    s.daysInBase = randInt(1, 3);
    s.happiness = randInt(35, 65);
    // Modest skill values — not too high
    s.skills.combat = randInt(20, 50);
    s.skills.medical = randInt(15, 45);
    s.skills.workshop = randInt(15, 45);
    s.skills.farming = randInt(15, 45);
    s.skills.social = randInt(20, 55);
    // Small specialty boost
    if (trait === 'DOKTOR') s.skills.medical = randInt(45, 65);
    if (trait === 'MÜHENDİS') { s.skills.workshop = randInt(45, 65); s.skills.engineering = randInt(45,65); }
    if (trait === 'ASKER' || trait === 'GÜVENLİK') s.skills.combat = randInt(40, 65);
    if (trait === 'ÇIFTÇI') s.skills.farming = randInt(40, 60);
    s.health = randInt(55, 85);
    STATE.people.push(s);
  });

  // Auto-assign one person per key building
  const byMedical = [...STATE.people].sort((a,b) => b.skills.medical - a.skills.medical);
  const byCombat  = [...STATE.people].sort((a,b) => b.skills.combat  - a.skills.combat);
  const bySocial  = [...STATE.people].sort((a,b) => b.skills.social  - a.skills.social);
  const usedIds   = new Set();
  function assignBest(sorted, building) {
    const p = sorted.find(x => !usedIds.has(String(x.id)));
    if (p) { assignPersonToBuilding(p.id, building); usedIds.add(String(p.id)); }
  }
  assignBest(byMedical, 'clinic');
  assignBest(byCombat,  'security');
  assignBest(bySocial,  'management');

  addLog('Last Bastion çevrimiçi. 5 kişilik başlangıç ekibi hazır.', 'success');
  addLog('Kapıda nöbetçi atamayı unutma! ÜS sekmesinden yapabilirsin.', 'warning');

  STATE.gate.timer = 20;
  STATE.resources = { food: 40, parts: 25, meds: 12, energy: 35, caps: 20 };

  generateMissions();
  updateUI();
  renderActivities();
  renderSocialTab();
  lastTick = Date.now();
  gameTick();
}

init();
</script>
