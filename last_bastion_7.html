<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LAST BASTION</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@300;400;600;700&family=Special+Elite&display=swap');

  :root {
    --bg: #0a0c08;
    --bg2: #0f1209;
    --panel: #121509;
    --border: #2a3018;
    --border-bright: #4a5a22;
    --green: #7ab32a;
    --green-dim: #3d5a12;
    --green-bright: #a8e040;
    --red: #c43a2a;
    --red-dim: #5a1a10;
    --amber: #c4892a;
    --amber-dim: #5a3d10;
    --blue: #2a6a8a;
    --text: #b8c890;
    --text-dim: #5a6a40;
    --text-bright: #d8e8a0;
    --dirt: #3a2a18;
    --grass: #1a2a0a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* SCANLINE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  /* TOP STATUS BAR */
  #topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border-bright);
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    position: relative;
  }
  #topbar::after {
    content: '';
    position: absolute;
    bottom: -3px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green-dim), var(--green), var(--green-dim), transparent);
    opacity: 0.5;
  }

  .title-logo {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--green-bright);
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--green);
  }

  .top-stats {
    display: flex;
    gap: 16px;
    font-size: 11px;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text);
  }
  .stat-pill .icon { font-size: 13px; }
  .stat-pill .val { color: var(--green-bright); font-weight: bold; }

  .day-badge {
    background: var(--green-dim);
    border: 1px solid var(--green);
    padding: 2px 8px;
    font-size: 10px;
    color: var(--green-bright);
    letter-spacing: 2px;
  }

  /* MAIN GAME AREA - now has left panel, map, right panel */
  #game-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* LEFT PANEL */
  #left-panel {
    width: 190px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* MAP VIEW */
  #map-view {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--grass);
  }

  #base-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* RIGHT PANEL */
  #right-panel {
    width: 190px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* SHARED PANEL STYLES */
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-tab {
    flex: 1;
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 7px 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .panel-tab:last-child { border-right: none; }
  .panel-tab.active { color: var(--green-bright); background: rgba(122,179,42,0.08); border-bottom: 2px solid var(--green); }
  .panel-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 8px;
  }
  .panel-title {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  /* LOG BAR AT BOTTOM */
  #log-bar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    height: 80px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #log-bar::-webkit-scrollbar { width: 3px; }
  #log-bar::-webkit-scrollbar-thumb { background: var(--green-dim); }
  #event-log { padding: 2px 6px; }



  /* SURVIVORS LIST */
  #survivors-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  #survivors-list::-webkit-scrollbar { width: 3px; }
  #survivors-list::-webkit-scrollbar-track { background: var(--bg); }
  #survivors-list::-webkit-scrollbar-thumb { background: var(--green-dim); }

  .survivor-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 6px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .survivor-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--green);
  }
  .survivor-card:hover { border-color: var(--green); }
  .survivor-card.infected::before { background: var(--red); }
  .survivor-card.suspicious::before { background: var(--amber); }

  .surv-name {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    color: var(--text-bright);
    margin-bottom: 3px;
  }
  .surv-stats {
    display: flex;
    gap: 6px;
    font-size: 9px;
    color: var(--text-dim);
  }
  .surv-stat { display: flex; align-items: center; gap: 2px; }
  .mini-bar {
    width: 20px;
    height: 4px;
    background: var(--bg);
    border-radius: 1px;
    overflow: hidden;
  }
  .mini-bar-fill { height: 100%; background: var(--green); border-radius: 1px; }
  .mini-bar-fill.low { background: var(--red); }
  .mini-bar-fill.mid { background: var(--amber); }

  /* BOTTOM ACTION BAR */
  #bottom-bar {
    background: var(--panel);
    border-top: 1px solid var(--border-bright);
    padding: 8px 12px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  #bottom-bar::-webkit-scrollbar { display: none; }

  .action-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 8px 10px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 60px;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .action-btn .btn-icon { font-size: 18px; }
  .action-btn:hover, .action-btn.active {
    border-color: var(--green-bright);
    color: var(--green-bright);
    background: var(--green-dim);
    box-shadow: 0 0 10px rgba(122,179,42,0.2);
  }
  .action-btn.danger:hover {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-dim);
  }

  /* MODAL OVERLAY */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  #modal-overlay.show { display: flex; }

  .modal-box {
    background: var(--panel);
    border: 1px solid var(--border-bright);
    max-width: 380px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green-dim), var(--green-bright), var(--green-dim));
  }

  .modal-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .modal-title {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: var(--green-bright);
    letter-spacing: 3px;
  }
  .modal-subtitle {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 1px;
  }
  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 26px; height: 26px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .modal-body { padding: 16px; }

  /* SURVIVOR DETAIL */
  .surv-portrait {
    width: 64px; height: 64px;
    background: var(--bg2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    float: left;
    margin-right: 12px;
    margin-bottom: 8px;
  }

  .surv-detail-name {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    color: var(--text-bright);
    letter-spacing: 2px;
  }
  .surv-detail-trait {
    font-size: 10px;
    color: var(--amber);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text-dim); letter-spacing: 1px; }
  .stat-value { color: var(--text-bright); }
  .stat-bar-wrap {
    width: 80px;
    height: 6px;
    background: var(--bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .stat-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
  .stat-bar-fill.red { background: var(--red); }
  .stat-bar-fill.amber { background: var(--amber); }

  .risk-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 10px;
    margin: 12px 0;
    font-size: 11px;
    line-height: 1.7;
  }
  .risk-box .risk-title {
    color: var(--amber);
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .risk-item { color: var(--text-dim); display: flex; gap: 6px; }
  .risk-item.danger { color: var(--red); }
  .risk-item.warning { color: var(--amber); }
  .risk-item.safe { color: var(--green); }

  .decision-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .decision-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 12px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.4;
  }
  .decision-btn .d-icon { font-size: 22px; }
  .decision-btn:hover { transform: translateY(-1px); }
  .decision-btn.accept { border-color: var(--green); }
  .decision-btn.accept:hover { background: var(--green-dim); color: var(--green-bright); box-shadow: 0 4px 12px rgba(122,179,42,0.3); }
  .decision-btn.quarantine { border-color: var(--blue); }
  .decision-btn.quarantine:hover { background: #0a1a28; color: #5aaad0; }
  .decision-btn.prison { border-color: var(--amber); }
  .decision-btn.prison:hover { background: var(--amber-dim); color: var(--amber); }
  .decision-btn.steal { border-color: #888; }
  .decision-btn.steal:hover { background: #222; color: #ccc; }
  .decision-btn.reject { border-color: #555; }
  .decision-btn.reject:hover { background: #1a1a1a; color: #aaa; }
  .decision-btn.execute { border-color: var(--red); }
  .decision-btn.execute:hover { background: var(--red-dim); color: var(--red); box-shadow: 0 4px 12px rgba(196,58,42,0.3); }

  /* GATE TIMER */
  .gate-timer-section {
    padding: 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .gate-timer-label { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 5px; }
  .gate-timer-bar { height: 6px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .gate-timer-fill { height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green-bright)); border-radius: 2px; transition: width 1s linear; }
  .gate-countdown { font-size: 11px; color: var(--green-bright); margin-top: 4px; text-align: right; }

  /* ROOMS */
  .room-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .room-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .room-card:hover { border-color: var(--green); }
  .room-card .room-icon { font-size: 20px; margin-bottom: 4px; }
  .room-card .room-name { font-size: 9px; letter-spacing: 1px; color: var(--text-dim); }
  .room-card .room-occupants { font-size: 11px; color: var(--text-bright); margin-top: 2px; }

  /* NOTIFICATION */
  #notification {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--green-bright);
    padding: 10px 20px;
    font-size: 12px;
    color: var(--green-bright);
    z-index: 999;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
    max-width: 300px;
    box-shadow: 0 0 20px rgba(122,179,42,0.3);
    pointer-events: none;
  }
  #notification.show { opacity: 1; }
  #notification.danger-notif {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 20px rgba(196,58,42,0.3);
  }

  /* GATE QUEUE */
  .gate-queue {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 6px;
  }
  .gate-person {
    width: 32px; height: 32px;
    background: var(--bg2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .gate-person:hover { border-color: var(--green-bright); transform: scale(1.1); }
  .gate-person.infected { border-color: var(--red); }
  .gate-person.suspicious { border-color: var(--amber); }
  .gate-person .status-dot {
    position: absolute;
    bottom: -2px; right: -2px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    border: 1px solid var(--bg);
  }
  .gate-person.infected .status-dot { background: var(--red); }
  .gate-person.suspicious .status-dot { background: var(--amber); }

  /* ANIMATED FLICKER */
  @keyframes flicker {
    0%, 98%, 100% { opacity: 1; }
    99% { opacity: 0.85; }
  }
  .title-logo { animation: flicker 5s infinite; }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 5px rgba(122,179,42,0.3); }
    50% { box-shadow: 0 0 15px rgba(122,179,42,0.6); }
  }

  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* SCROLL AREAS */
  .scroll-area { overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--green-dim); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 20px 10px;
    color: var(--text-dim);
    font-size: 11px;
    line-height: 2;
  }
  .empty-state .big { font-size: 28px; margin-bottom: 8px; }

  /* INFO CHIPS */
  .chip {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 2px 7px;
    font-size: 9px;
    letter-spacing: 1px;
    margin: 2px;
    color: var(--text-dim);
  }
  .chip.green { border-color: var(--green-dim); color: var(--green); }
  .chip.red { border-color: var(--red-dim); color: var(--red); }
  .chip.amber { border-color: var(--amber-dim); color: var(--amber); }

  /* Inventory display */
  .inv-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 5px;
  }
  .inv-item {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 7px;
    font-size: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* VIEW TABS */
  .view-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .view-tab {
    flex:1; background:none; border:none; color:var(--text-dim);
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px;
    padding:7px 4px; cursor:pointer; border-right:1px solid var(--border); transition:all 0.15s; text-transform:uppercase;
  }
  .view-tab:last-child { border-right:none; }
  .view-tab.active { color:var(--green-bright); background:rgba(122,179,42,0.08); border-bottom:2px solid var(--green); }
  .view-tab:hover:not(.active) { color:var(--text); background:var(--bg2); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* RESOURCE BARS */
  .resource-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    font-size: 10px;
  }
  .resource-icon { font-size: 14px; width: 18px; text-align: center; }
  .resource-name { width: 55px; color: var(--text-dim); letter-spacing: 1px; font-size: 9px; }
  .resource-bar { flex: 1; height: 5px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .resource-bar-fill { height: 100%; background: var(--green); border-radius: 2px; }
  .resource-val { font-size: 10px; color: var(--text-bright); min-width: 28px; text-align: right; }

  /* LOG */
  #event-log {
    padding: 6px;
    font-size: 10px;
    line-height: 1.8;
    color: var(--text-dim);
    flex: 1;
    overflow-y: auto;
  }
  #event-log::-webkit-scrollbar { width: 3px; }
  #event-log::-webkit-scrollbar-thumb { background: var(--green-dim); }
  .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(42,48,24,0.5); }
  .log-entry .log-time { color: var(--green-dim); margin-right: 6px; }
  .log-entry.log-danger { color: var(--red); }
  .log-entry.log-warning { color: var(--amber); }
  .log-entry.log-success { color: var(--green); }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 10px 0;
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 2px;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* UPGRADE MODAL */
  .upgrade-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 10px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .upgrade-info { flex: 1; }
  .upgrade-name { font-family: 'Oswald', sans-serif; font-size: 13px; color: var(--text-bright); letter-spacing: 1px; }
  .upgrade-desc { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
  .upgrade-cost { font-size: 10px; color: var(--amber); margin-top: 3px; }
  .upgrade-btn {
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: var(--green-bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 7px 12px;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .upgrade-btn:hover { background: var(--green); color: var(--bg); }
  .upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* CLEARFIX */
  .clearfix::after { content: ''; display: table; clear: both; }

  /* ACTIVITY SYSTEM */
  .activity-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .activity-card:hover { border-color: var(--green); }
  .activity-card.active-task { border-color: var(--amber); }
  .activity-card.locked { opacity: 0.45; cursor: not-allowed; }
  .activity-card .act-header {
    display: flex;
    align-items: center;
    gap: 8px;

function getAssignedBuilding(personId) {
  const assignments = STATE.base.assignments;
  for (const [building, ids] of Object.entries(assignments)) {
    if (ids.includes(String(personId)) || ids.includes(personId)) return building;
  }
  return null;
}

  management: { icon: '🏛️', name: 'Yönetim', skill: 'social' },
  gate: { icon: '🚪', name: 'Kapı Nöbeti', skill: 'combat' },
};

function assignPersonToBuilding(personId, building) {
  const pid = String(personId);
  // Remove from all buildings first
  Object.keys(STATE.base.assignments).forEach(b => {
    STATE.base.assignments[b] = STATE.base.assignments[b].filter(id => String(id) !== pid);
  });
  if (building) {
    STATE.base.assignments[building].push(pid);
  }
}



const NAMES_M = ['Mehmet','Ali','Hasan','Osman','Murat','Emre','Burak','Kaan','Tarık','Can','Cem','Bora','Volkan','Efe','Tuna','Barış','Umut','Furkan','Alp','Serkan'];
const NAMES_F = ['Ayşe','Zeynep','Fatma','Elif','Leyla','Ceren','Selin','Pınar','Gül','Yıldız','Aslı','İrem','Naz','Esra','Merve','Dila','Ece','Beyza','Su','Deniz'];
const NAMES = [...NAMES_M, ...NAMES_F];

function generateSurvivor() {
  const male = Math.random() > 0.45;
  const namePool = male ? NAMES_M : NAMES_F;
  const name = randFrom(namePool);
  const emoji = randFrom(male ? EMOJIS_M : EMOJIS_F);
  const trait = randFrom(TRAITS);

  let health = randInt(30, 100);
  let infected = false;
  let suspicious = false;
  let danger = 0;

  if (trait === 'HASTALIIKH' || trait === 'YARALAMA') { health = randInt(10, 50); }
  if (Math.random() < 0.2) { infected = true; health = randInt(20, 70); }
  if (trait === 'TEHLİKELİ' || trait === 'PARANOYAK') { suspicious = true; danger = randInt(30, 80); }
  if (!suspicious && Math.random() < 0.1) { suspicious = true; danger = randInt(10, 40); }

  const skills = {
    combat: randInt(0, 100),
    medical: trait === 'DOKTOR' ? randInt(60,100) : randInt(0, 50),
    engineering: trait === 'MÜHENDİS' ? randInt(60,100) : randInt(0, 50),
    farming: trait === 'ÇIFTÇI' ? randInt(60,100) : randInt(0, 50),
    social: trait === 'GÜVENLİK' || trait === 'NÖBETÇI' ? randInt(40,80) : randInt(0, 100),
    workshop: trait === 'MÜHENDİS' ? randInt(60,100) : randInt(0, 60),
    morale: randInt(0, 100),
  };

  const items = [];
  const itemCount = randInt(0, 3);
  for (let i = 0; i < itemCount; i++) items.push(randFrom(ITEM_NAMES));

  const foodNeeded = trait === 'ÇOCUk' ? 0.5 : trait === 'HAMİLE' ? 2 : 1;
  const age = trait === 'ÇOCUk' ? randInt(5,14) : trait === 'YAŞLI' ? randInt(60,80) : randInt(18,55);

  // Personality traits affecting social interactions
  const personalities = ['UYUMLU','SALDIRGAN','ÇEKİNGEN','KARİZMATİK','ÇALIŞKAN','TEMBEL','KIRISKAN','NEŞELİ'];
  const personality = randFrom(personalities);

  return {
    id: Date.now() + Math.random(),
    name, emoji, trait, health, infected, suspicious, danger,
    skills, items, foodNeeded, male, age,
    personality,
    location: 'KAPI',
    daysInBase: 0,
    happiness: randInt(30,70),  // 0-100
    partnerId: null,            // romantic partner id
    spouseId: null,
    childrenIds: [],
    pregnantDays: 0,            // >0 = pregnant
    enemyIds: [],
    friendIds: [],
    onMission: null,            // mission id if away
    isChild: trait === 'ÇOCUk',
  };
}

// ==================== RENDERING ====================
const canvas = document.getElementById('base-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const mapView = document.getElementById('map-view');
  canvas.width = mapView.offsetWidth;
  canvas.height = mapView.offsetHeight;
  drawBase();
}

function drawBase() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background - dirt/grass
  ctx.fillStyle = '#111508';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(40,60,20,0.3)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 30) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  const cx = W / 2, cy = H / 2;

  // OUTER WALL
  ctx.strokeStyle = '#3a5018';
  ctx.lineWidth = 4;
  ctx.strokeRect(cx - 90, cy - 70, 180, 140);
  ctx.strokeStyle = '#2a3a10';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - 94, cy - 74, 188, 148);

  // Wall fill
  ctx.fillStyle = 'rgba(30,40,15,0.6)';
  ctx.fillRect(cx - 90, cy - 70, 180, 140);

  // GATE (south)
  ctx.fillStyle = '#1a2a08';
  ctx.fillRect(cx - 18, cy + 60, 36, 14);
  ctx.strokeStyle = '#5a8020';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx - 18, cy + 60, 36, 14);
  // Gate icon
  ctx.fillStyle = '#7ab32a';
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🚪', cx, cy + 72);

  // MAIN BUILDING
  ctx.fillStyle = '#1e2a10';
  ctx.strokeStyle = '#4a6520';
  ctx.lineWidth = 2;
  ctx.fillRect(cx - 45, cy - 40, 90, 65);
  ctx.strokeRect(cx - 45, cy - 40, 90, 65);

  // Building label
  ctx.fillStyle = '#5a7a30';
  ctx.font = '8px Share Tech Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ANA BİNA', cx, cy - 28);

  // Roof detail
  ctx.fillStyle = '#2a3a18';
  ctx.fillRect(cx - 40, cy - 38, 80, 6);

  // BARRACKS
  drawRoom(ctx, cx - 75, cy - 55, 22, 18, '🏠', 'BARAKALAR');

  // QUARANTINE
  drawRoom(ctx, cx + 52, cy - 55, 26, 20, '🔒', 'KAR');

  // WORKSHOP (locked if not built)
  if (STATE.base.upgrades.workshop) {
    drawRoom(ctx, cx - 75, cy + 20, 26, 22, '⚙️', 'ATÖLYE');
  } else {
    drawLockedRoom(ctx, cx - 75, cy + 20, 26, 22);
  }

  // CLINIC (locked if not built)
  if (STATE.base.upgrades.clinic) {
    drawRoom(ctx, cx + 52, cy + 15, 26, 22, '🔬', 'KLİNİK');
  } else {
    drawLockedRoom(ctx, cx + 52, cy + 15, 26, 22);
  }

  // PEOPLE dots
  STATE.people.forEach((p, i) => {
    const px = cx - 30 + (i % 5) * 14;
    const py = cy - 20 + Math.floor(i / 5) * 14;
    ctx.fillStyle = p.infected ? '#c43a2a' : '#7ab32a';
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // QUARANTINED people
  STATE.quarantined.forEach((p, i) => {
    ctx.fillStyle = '#2a6a8a';
    ctx.beginPath();
    ctx.arc(cx + 58 + (i % 3) * 8, cy - 48 + Math.floor(i / 3) * 8, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // IMPRISONED people  
  STATE.imprisoned.forEach((p, i) => {
    ctx.fillStyle = '#c4892a';
    ctx.beginPath();
    ctx.arc(cx - 65 + (i % 3) * 8, cy - 48 + Math.floor(i / 3) * 8, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Gate queue dots
  STATE.gate.queue.forEach((p, i) => {
    const gx = cx - (STATE.gate.queue.length * 8) / 2 + i * 16;
    const gy = cy + 88;
    ctx.fillStyle = p.infected ? '#c43a2a' : p.suspicious ? '#c4892a' : '#7ab32a';
    ctx.beginPath();
    ctx.arc(gx, gy, 5, 0, Math.PI * 2);
    ctx.fill();
    // Small emoji
    ctx.font = '10px serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.emoji, gx, gy - 7);
  });

  // Defense rating
  const defense = 30 + STATE.base.upgrades.walls * 15;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(4, H - 20, 80, 16);
  ctx.fillStyle = '#3d5a12';
  ctx.font = '9px Share Tech Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SAVUNMA: ' + defense + '%', 8, H - 8);
}

function drawRoom(ctx, x, y, w, h, icon, label) {
  ctx.fillStyle = '#182210';
  ctx.strokeStyle = '#3a5020';
  ctx.lineWidth = 1.5;
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);
  ctx.font = '9px serif';
  ctx.textAlign = 'center';
  ctx.fillText(icon, x + w/2, y + h/2 + 2);
}

function drawLockedRoom(ctx, x, y, w, h) {
  ctx.fillStyle = '#0a0c08';
  ctx.strokeStyle = '#1a2010';
  ctx.lineWidth = 1;
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#2a3018';
  ctx.font = '9px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🔒', x + w/2, y + h/2 + 2);
}

// ==================== UI UPDATES ====================
function updateUI() {
  document.getElementById('pop-count').textContent = STATE.people.length + STATE.quarantined.length + STATE.imprisoned.length;
  document.getElementById('pop-max').textContent = STATE.base.maxPop;
  document.getElementById('food-count').textContent = Math.floor(STATE.resources.food);
  document.getElementById('parts-count').textContent = Math.floor(STATE.resources.parts);
  document.getElementById('meds-count').textContent = Math.floor(STATE.resources.meds);
  document.getElementById('day-badge').textContent = 'GÜN ' + STATE.day;

  // Resources in base tab
  const maxFood = 50, maxParts = 50, maxMeds = 30, maxEnergy = 50, maxCaps = 100;
  const setRes = (id, val, max) => {
    const bar = document.getElementById('rb-' + id);
    const label = document.getElementById('rv-' + id);
    if (bar) bar.style.width = clamp(val / max * 100, 0, 100) + '%';
    if (label) label.textContent = Math.floor(val);
  };
  setRes('food', STATE.resources.food, maxFood);
  setRes('parts', STATE.resources.parts, maxParts);
  setRes('meds', STATE.resources.meds, maxMeds);
  setRes('energy', STATE.resources.energy, maxEnergy);
  setRes('caps', STATE.resources.caps, maxCaps);

  // Gate queue
  const queueEl = document.getElementById('gate-queue');
  document.getElementById('gate-count').textContent = STATE.gate.queue.length;
  document.getElementById('gate-max').textContent = STATE.gate.maxQueue;

  if (STATE.gate.queue.length === 0) {
    queueEl.innerHTML = `<div class="empty-state"><div class="big">🚪</div><div>Henüz kimse yok<br>bekleniyor<span class="blink">_</span></div></div>`;
  } else {
    queueEl.innerHTML = STATE.gate.queue.map(p => `
      <div class="gate-person ${p.infected ? 'infected' : p.suspicious ? 'suspicious' : ''}" onclick="showSurvivorDecision('${p.id}')">
        ${p.emoji}
        <div class="status-dot"></div>
      </div>
    `).join('');
  }

  // Base people list — rich barracks view
  renderBasePeopleList();
  renderBuildingAssignments();

  drawBase();
}

// ==================== TIMER ====================
let lastTick = Date.now();

function gameTick() {
  const now = Date.now();
  const dt = (now - lastTick) / 1000; // seconds
  lastTick = now;

  STATE.gate.timer -= dt;
  if (STATE.gate.timer <= 0) {
    STATE.gate.timer = STATE.gate.timerMax;
    spawnSurvivor();
  }

  // Activity & farm ticks
  taskTick(dt);
  farmTick(dt);

  // Refresh activity panel every 2s
  STATE._actRefresh = (STATE._actRefresh || 0) + dt;
  if (STATE._actRefresh > 2) { STATE._actRefresh = 0; renderActivities(); }

  const progress = 1 - (STATE.gate.timer / STATE.gate.timerMax);
  document.getElementById('gate-timer-fill').style.width = (progress * 100) + '%';

  const remaining = Math.ceil(STATE.gate.timer);
  const m = Math.floor(remaining / 60).toString().padStart(2,'0');
  const s = (remaining % 60).toString().padStart(2,'0');
  document.getElementById('gate-countdown').textContent = m + ':' + s;

  // Check training completion
  checkTrainingCompletion();

  requestAnimationFrame(gameTick);
}

function spawnSurvivor() {
  if (STATE.gate.queue.length >= STATE.gate.maxQueue) {
    // Queue full, someone leaves
    const leaving = STATE.gate.queue.shift();
    addLog(`${leaving.name} kapıda beklemekten vazgeçti ve ayrıldı.`, 'warning');
    showNotification('Biri ayrıldı: ' + leaving.name, false);
  }
  const surv = generateSurvivorWithLowHealth();
  STATE.gate.queue.push(surv);
  addLog(`Yeni survivor kapıda: ${surv.name} [${surv.trait}]`, surv.infected ? 'danger' : surv.suspicious ? 'warning' : 'success');
  showNotification('🚨 Yeni survivor: ' + surv.name, false);
  updateUI();

  // Pulse gate tab
  document.querySelector('.view-tab').style.color = 'var(--green-bright)';
  setTimeout(() => { document.querySelector('.view-tab').style.color = ''; }, 2000);
}

// ==================== SURVIVOR DECISION ====================
function skillBar(label, val, labelFn, colorOverride) {
  const pct = clamp(val, 0, 100);
  const color = colorOverride || (pct >= 65 ? 'var(--green)' : pct >= 35 ? 'var(--amber)' : 'var(--red)');
  const sublabel = labelFn ? labelFn(val) : '';
  return `
    <div class="stat-row">
      <span class="stat-label">${label}</span>
      <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="stat-value">${val}</span>
      ${sublabel ? `<span style="font-size:9px;color:var(--text-dim);margin-left:4px;font-style:italic">(${sublabel})</span>` : ''}
    </div>`;
}

function showSurvivorDecision(id) {
  const surv = STATE.gate.queue.find(p => String(p.id) === String(id));
  if (!surv) return;

  const totalPop = STATE.people.length + STATE.quarantined.length + STATE.imprisoned.length;
  const atMaxPop = totalPop >= STATE.base.maxPop;

  const risks = [];
  if (surv.infected) risks.push({ text: '⚠️ ENFEKSİYON belirtileri var — ÇOK YÜKSEK risk', cls: 'danger' });
  if (surv.suspicious) risks.push({ text: `⚠️ Şüpheli davranış (Tehlike: ${surv.danger}%)`, cls: surv.danger > 50 ? 'danger' : 'warning' });
  if (surv.health < 30) risks.push({ text: '⚠️ Kritik sağlık — ilaç gerekebilir', cls: 'warning' });
  if (surv.trait === 'TEHLİKELİ') risks.push({ text: '⚠️ Tehlikeli geçmiş', cls: 'danger' });
  if (surv.trait === 'HAMİLE') risks.push({ text: '⚠️ Hamile — yüksek kaynak tüketimi', cls: 'warning' });

  const benefits = [];

function decideSurvivor(id, action) {
  const idx = STATE.gate.queue.findIndex(p => String(p.id) === String(id));
  if (idx === -1) return;
  const surv = STATE.gate.queue.splice(idx, 1)[0];
  const totalPop = STATE.people.length + STATE.quarantined.length + STATE.imprisoned.length;

  // Gate officers (affect morale/health based on decisions)
  const gateOfficers = (STATE.base.assignments.gate || [])
    .map(gid => STATE.people.find(p => String(p.id) === String(gid)))
    .filter(Boolean);

  function affectGateOfficers(morDelta, healthDelta) {
    gateOfficers.forEach(o => {
      o.happiness = clamp((o.happiness||50) + morDelta, 0, 100);
      o.health = clamp(o.health + healthDelta, 0, 100);
    });
  }

  // HIDDEN INFECTION: survivor's true infected state is hidden from player.
  // We store it on the object but the decision is made without knowing.
  // After 1 day in base it will be revealed. Mark as pending reveal.
  const trueInfected = surv.infected;
  surv.infected = false;       // hide from base display
  surv.infectionPending = trueInfected;  // will be revealed after 1 day

  switch(action) {
    case 'accept':
      if (totalPop >= STATE.base.maxPop) {
        showNotification('⛔ Üs kapasitesi dolu!', true);
        surv.infected = trueInfected; surv.infectionPending = false;
        STATE.gate.queue.unshift(surv);
        return;
      }
      surv.location = 'barracks';
      surv.daysInBase = 0;
      STATE.people.push(surv);
      STATE.total_accepted++;
      surv.items.forEach(item => applyItem(item));  // auto-add items
      addLog(`✅ ${surv.name} (${surv.trait}) üse kabul edildi. Eşyaları depoya eklendi.`, 'success');
      showNotification(`✅ ${surv.name} üse alındı!`, false);
      // Gate officer: morally neutral
      break;

    case 'quarantine':
      if (totalPop >= STATE.base.maxPop) {
        showNotification('⛔ Üs kapasitesi dolu!', true);
        surv.infected = trueInfected; surv.infectionPending = false;
        STATE.gate.queue.unshift(surv);
        return;
      }
      surv.location = 'quarantine';
      surv.daysInBase = 0;
      STATE.quarantined.push(surv);
      STATE.total_accepted++;
      surv.items.forEach(item => applyItem(item));  // auto-add items
      addLog(`🔒 ${surv.name} karantinaya alındı. Eşyaları depoya eklendi.`, 'warning');
      showNotification(`🔒 ${surv.name} karantinada`, false);
      break;

    case 'prison':
      if (totalPop >= STATE.base.maxPop) {
        showNotification('⛔ Üs kapasitesi dolu!', true);
        surv.infected = trueInfected; surv.infectionPending = false;
        STATE.gate.queue.unshift(surv);
        return;
      }
      surv.location = 'prison';
      surv.daysInBase = 0;
      surv.infected = trueInfected; surv.infectionPending = false;
      STATE.imprisoned.push(surv);
      surv.items.forEach(item => applyItem(item));  // auto-add items
      addLog(`⚠️ ${surv.name} hücreye konuldu. Eşyaları müsadere edildi.`, 'warning');
      showNotification(`⚠️ ${surv.name} hücrede`, false);
      break;

    case 'steal':
      surv.infected = trueInfected; surv.infectionPending = false;
      if (surv.items.length > 0) {
        surv.items.forEach(item => applyItem(item));
        addLog(`💰 ${surv.name}'in eşyaları alındı ve kovuldu.`, 'warning');
        showNotification(`💰 Eşyalar alındı, survivor kovuldu`, false);
        // Potential future attacker
        if (Math.random() < 0.35) {
          STATE.social.alerts.push({ id: Date.now(), msg: `⚠️ Kovulan ${surv.name} saldırıya geri dönebilir!`, type:'threat', actionFn:null });
          STATE._potentialAttackers = (STATE._potentialAttackers || 0) + 1;
        }
        // Gate officers: if survivor was infected, officers health drops
        if (trueInfected) {
          affectGateOfficers(-5, -8);
          addLog(`🦠 Yağmalanan survivor enfekteydi! Kapı nöbetçileri etkilendi.`, 'danger');
        }
      } else {
        addLog(`${surv.name}'in eşyası yoktu, kovuldu.`, '');
        showNotification(`😶 Eşya yoktu`, false);
      }
      STATE.total_rejected++;
      // Future raid risk increases
      STATE._potentialAttackers = (STATE._potentialAttackers || 0) + 1;
      break;

    case 'reject':
      surv.infected = trueInfected; surv.infectionPending = false;
      STATE.total_rejected++;
      addLog(`⛔ ${surv.name} reddedildi ve geri gönderildi.`, '');
      showNotification(`⛔ ${surv.name} reddedildi`, false);
      // Future raid risk
      if (Math.random() < 0.2) {
        STATE._potentialAttackers = (STATE._potentialAttackers || 0) + 1;
      }
      break;

    case 'execute':
      surv.infected = trueInfected; surv.infectionPending = false;
      STATE.total_executed++;
      STATE._lastExecuted = surv; // store for loot modal
      // Show loot choice modal BEFORE closing
      closeModal();
      showExecuteLootModal(surv, trueInfected);
      updateUI();
      return; // skip closeModal below
  }

  closeModal();
  updateUI();
}

function executeLoot(survId, takeLoot, wasInfected) {
  // Find surv from a temporary store — we pass data via closure above, use STATE._lastExecuted
  // Gate officers affected
  const gateOfficers = (STATE.base.assignments.gate || [])
    .map(gid => STATE.people.find(p => String(p.id) === String(gid)))
    .filter(Boolean);

  if (takeLoot) {
    // Find the survivor from gate queue (it was already removed; items stored on local ref)
    // Morale drop for killing
    gateOfficers.forEach(o => { o.happiness = clamp((o.happiness||50) - 8, 0, 100); });
    STATE.social.morale = clamp(STATE.social.morale - 5, 0, 100);
    if (wasInfected) {
      // Health risk for taking infected items
      gateOfficers.forEach(o => { o.health = clamp(o.health - 15, 0, 100); });
      addLog(`💀 Enfekte eşyalar alındı. Kapı nöbetçilerinin sağlığı düştü!`, 'danger');
    } else {
      addLog(`💰 Eşyalar alındı. Moral düştü.`, 'warning');
    }
    // Note: actual item application was removed from execute case — we apply here
    // but we've lost the surv reference. Store it temporarily.
    if (STATE._lastExecuted) {
      STATE._lastExecuted.items.forEach(item => applyItem(item));
    }
  } else {
    if (wasInfected) {
      // Left infected body → morale bonus (right decision)
      gateOfficers.forEach(o => { o.happiness = clamp((o.happiness||50) + 5, 0, 100); });
      STATE.social.morale = clamp(STATE.social.morale + 3, 0, 100);
      addLog(`✓ Enfekte cesedi terk edildi. Doğru karar — moral arttı.`, 'success');
    } else {
      // Normal killing with no loot — just morale hit
      gateOfficers.forEach(o => { o.happiness = clamp((o.happiness||50) - 5, 0, 100); });
      STATE.social.morale = clamp(STATE.social.morale - 3, 0, 100);
      addLog(`💀 Survivor öldürüldü, eşyalar terk edildi. Moral düştü.`, 'warning');
    }
  }
  STATE._lastExecuted = null;
  updateUI();
}

function applyItem(itemStr) {
  if (itemStr.includes('İlaç')) STATE.resources.meds += parseInt(itemStr.match(/\d+/)?.[0] || 1);
  if (itemStr.includes('Yiyecek')) STATE.resources.food += parseInt(itemStr.match(/\d+/)?.[0] || 3);
  if (itemStr.includes('Parça')) STATE.resources.parts += parseInt(itemStr.match(/\d+/)?.[0] || 2);
  if (itemStr.includes('Su')) STATE.resources.food += 1;
  if (itemStr.includes('Kap Parası')) STATE.resources.caps += parseInt(itemStr.match(/\d+/)?.[0] || 3);
  if (itemStr.includes('Pil')) STATE.resources.energy += parseInt(itemStr.match(/\d+/)?.[0] || 1) * 3;
}

function doUpgrade(type) {
  switch(type) {
    case 'farm':
      if (STATE.farm.unlocked >= 6) return;
      STATE.resources.caps -= 8; STATE.resources.parts -= 5;
      STATE.farm.unlocked++;
      addLog(`Yeni tarla parseli açıldı (${STATE.farm.unlocked}/6).`, 'success');
      showNotification(`🌾 Yeni tarla açıldı!`, false);
      break;
    case 'pop':
      if (STATE.resources.caps < 15 || STATE.resources.parts < 10) return;
      STATE.resources.caps -= 15;
      STATE.resources.parts -= 10;
      STATE.base.maxPop++;
      addLog(`Üs kapasitesi ${STATE.base.maxPop} kişiye çıkarıldı.`, 'success');
      showNotification(`✅ Kapasite: ${STATE.base.maxPop}`, false);
      break;
    case 'clinic':
      if (STATE.base.upgrades.clinic) return;
      STATE.resources.caps -= 20; STATE.resources.parts -= 15; STATE.resources.meds -= 5;
      STATE.base.upgrades.clinic = true;
      addLog('Klinik inşa edildi!', 'success');
      showNotification('🔬 Klinik hazır!', false);
      break;
    case 'workshop':
      if (STATE.base.upgrades.workshop) return;
      STATE.resources.caps -= 18; STATE.resources.parts -= 20;
      STATE.base.upgrades.workshop = true;
      addLog('Atölye inşa edildi!', 'success');
      showNotification('⚙️ Atölye hazır!', false);
      break;
    case 'walls':
      STATE.resources.caps -= 12; STATE.resources.parts -= 8;
      STATE.base.upgrades.walls++;
      addLog(`Duvarlar güçlendirildi (Seviye ${STATE.base.upgrades.walls}).`, 'success');
      showNotification(`🏗️ Duvarlar güçlendi!`, false);
      break;
    case 'solar':
      STATE.resources.caps -= 10; STATE.resources.parts -= 12;
      STATE.base.upgrades.solar++;
      STATE.resources.energy = Math.min(50, STATE.resources.energy + 10);
      addLog(`Güneş paneli eklendi (Seviye ${STATE.base.upgrades.solar}).`, 'success');
      showNotification(`☀️ Enerji artıyor!`, false);
      break;
  }
  closeModal();
  updateUI();
}

// ==================== MORALE SKILL BONUS ====================
function getEffectiveSkill(person, skillKey) {
  const base = person.skills[skillKey] || 0;
  const morale = person.happiness || 50;
  let bonus = 0;
  if (morale >= 80) bonus = 5;
  else if (morale >= 60) bonus = 2;
  else if (morale >= 50) bonus = 1;
  else if (morale >= 35) bonus = -3;
  else if (morale >= 20) bonus = -7;
  else bonus = -12;
  return clamp(base + bonus, 0, 100);
}

// ==================== INFECTION REVEAL ====================
function revealInfections() {
  // After 1 day in base, pending infections are revealed
  [...STATE.people, ...STATE.quarantined].forEach(p => {
    if (p.infectionPending && p.daysInBase >= 1) {
      p.infected = true;
      p.infectionPending = false;
      addLog(`🦠 UYARI: ${p.name}'in ENFEKTELİ olduğu ortaya çıktı! (${p.location === 'quarantine' ? 'Karantinada' : 'Barakalarda'})`, 'danger');
      showNotification(`🦠 ${p.name} ENFEKTELİ çıktı!`, true);
      if (p.location !== 'quarantine') {
        // Spread risk — could infect neighbours
        STATE.social.morale = clamp(STATE.social.morale - 10, 0, 100);
        STATE.social.tensionLevel = clamp(STATE.social.tensionLevel + 15, 0, 100);
        addSocialAlert(`🦠 ${p.name} barakalarda enfekte çıktı! Karantinaya al!`, 'epidemic', null);
      }
    }
  });
}

// ==================== WORKSHOP PRODUCTION ====================
function processWorkshop() {
  const workers = (STATE.base.assignments.workshop || [])
    .map(id => STATE.people.find(p => String(p.id) === String(id))).filter(Boolean);
  if (!STATE.base.upgrades.workshop || workers.length === 0) return [];

  const results = [];
  workers.forEach(w => {
    const eff = getEffectiveSkill(w, 'workshop');
    const partsGained = Math.floor(eff / 20) + randInt(1, 3);
    const capsGained = Math.floor(eff / 30) + randInt(0, 2);
    STATE.resources.parts += partsGained;
    STATE.resources.caps += capsGained;
    results.push({ name: w.name, parts: partsGained, caps: capsGained, eff });
    // Random workshop event
    if (Math.random() < 0.15) {
      const events = [
        { msg: `${w.name} atölyede yeni bir alet geliştirdi!`, bonus: { parts: 3 } },
        { msg: `${w.name} bir ekipmanı tamir etti, enerji kazanıldı.`, bonus: { energy: 5 } },
        { msg: `${w.name} dikkatsizlik yüzünden bir parçayı mahvetti.`, bonus: { parts: -2 } },
      ];
      const ev = randFrom(events);
      Object.entries(ev.bonus).forEach(([k,v]) => { STATE.resources[k] = Math.max(0, (STATE.resources[k]||0) + v); });
      results.push({ event: ev.msg });
      addLog(`⚙️ ${ev.msg}`, v < 0 ? 'warning' : 'success');
    }
  });
  return results;
}

function updateFoodTotal() {
  const inputs = document.querySelectorAll('#food-dist-list input[type=range]');
  let total = 0;
  inputs.forEach(inp => total += parseInt(inp.value));
  const el = document.getElementById('total-food-dist');
  if (el) {
    el.textContent = total;
    el.style.color = total > STATE.resources.food ? 'var(--red)' : 'var(--green-bright)';
  }
}

function autoDistributeFood() {
  const inputs = document.querySelectorAll('#food-dist-list input[type=range]');
  const people = STATE.people;
  let remaining = Math.floor(STATE.resources.food);
  const perPerson = Math.min(10, Math.floor(remaining / Math.max(people.length, 1)));
  inputs.forEach((inp, i) => {
    const max = parseInt(inp.max);
    const val = Math.min(max, perPerson);
    inp.value = val;
    if (inp.nextElementSibling) inp.nextElementSibling.textContent = val;
  });
  updateFoodTotal();
}

function confirmFoodDistribution() {
  const inputs = document.querySelectorAll('#food-dist-list input[type=range]');
  const foodLog = [];
  let totalSpent = 0;

  inputs.forEach(inp => {
    const pid = inp.dataset.personId;
    const amount = parseInt(inp.value);
    const person = STATE.people.find(p => String(p.id) === String(pid));
    if (!person) return;
    totalSpent += amount;

    // Apply food effects
    const maxFood = person.male ? 10 : 9;
    if (amount >= maxFood) {
      // Full meal — max moral bonus
      person.happiness = clamp((person.happiness||50) + 5, 0, 100);
      foodLog.push(`${person.name}: dolu yedi (+5 moral)`);
    } else if (amount >= 5) {
      // Adequate — no bonus no penalty
      foodLog.push(`${person.name}: yeterli yedi`);
    } else if (amount === 4) {
      person.happiness = clamp((person.happiness||50) - 3, 0, 100);
      person.health = clamp(person.health - 2, 0, 100);
      foodLog.push(`${person.name}: az yedi (-3 moral, -2 sağlık)`);
    } else if (amount === 3) {
      person.happiness = clamp((person.happiness||50) - 6, 0, 100);
      person.health = clamp(person.health - 5, 0, 100);
    } else if (amount === 2) {
      person.happiness = clamp((person.happiness||50) - 10, 0, 100);
      person.health = clamp(person.health - 8, 0, 100);
    } else if (amount === 1) {
      person.happiness = clamp((person.happiness||50) - 15, 0, 100);
      person.health = clamp(person.health - 12, 0, 100);
    } else {
      // 0 food — severe penalty
      person.happiness = clamp((person.happiness||50) - 25, 0, 100);
      person.health = clamp(person.health - 20, 0, 100);
      addLog(`🚨 ${person.name} hiç yemedi! Ağır etki.`, 'danger');
    }
  });

  STATE.resources.food = Math.max(0, STATE.resources.food - totalSpent);
  addLog(`🍖 Yiyecek dağıtımı tamamlandı. Toplam: ${totalSpent} kaynak harcandı.`, 'success');
  closeModal();
  updateUI();
}

// ==================== DAY ADVANCE ====================
function advanceDay() {
  const dayReport = { workshop: [], missions: [] };

  // Capture mission log messages
  const origAddLog = addLog;

  // Increase days in base
  STATE.people.forEach(p => p.daysInBase = (p.daysInBase||0) + 1);
  STATE.quarantined.forEach(p => p.daysInBase = (p.daysInBase||0) + 1);

  // REVEAL HIDDEN INFECTIONS
  revealInfections();

  // WORKSHOP PRODUCTION
  dayReport.workshop = processWorkshop();

  // Farm production from assigned farmers
  const farmWorkers = (STATE.base.assignments.farm || [])
    .map(id => STATE.people.find(p => String(p.id) === String(id))).filter(Boolean);
  farmWorkers.forEach(w => {
    const eff = getEffectiveSkill(w, 'farming');
    const gain = Math.floor(eff / 15) + randInt(1, 4);
    STATE.resources.food += gain;
    addLog(`🌾 ${w.name} tarlada ${gain} yiyecek üretti.`, 'success');
  });

  // Management bonus
  const mgmtWorkers = (STATE.base.assignments.management || [])
    .map(id => STATE.people.find(p => String(p.id) === String(id))).filter(Boolean);
  mgmtWorkers.forEach(w => {
    const eff = getEffectiveSkill(w, 'social');
    const capsBonus = Math.floor(eff / 20);
    STATE.resources.caps += capsBonus;
    STATE.social.morale = clamp(STATE.social.morale + Math.floor(eff / 40), 0, 100);
  });

  // Clinic healing
  const clinicWorkers = (STATE.base.assignments.clinic || [])
    .map(id => STATE.people.find(p => String(p.id) === String(id))).filter(Boolean);
  if (STATE.base.upgrades.clinic && clinicWorkers.length > 0) {
    clinicWorkers.forEach(doc => {
      const eff = getEffectiveSkill(doc, 'medical');
      const heal = Math.floor(eff / 20);
      STATE.people.filter(p => p.health < 90 && p.id !== doc.id).slice(0, clinicWorkers.length * 3).forEach(p => {
        p.health = clamp(p.health + heal, 0, 100);
      });
    });
  }

  // Energy consumption
  const totalPeople = STATE.people.length + STATE.quarantined.length * 0.5 + STATE.imprisoned.length * 0.5;
  STATE.resources.energy = Math.max(0, STATE.resources.energy - totalPeople * 1.5 + STATE.base.upgrades.solar * 5);
  STATE.resources.caps += STATE.people.length * 0.5; // small daily income

  // Quarantine checks
  const toRemoveQ = [];
  STATE.quarantined.forEach((p) => {
    if (p.daysInBase >= 3) {
      if (p.infected) {
        if (Math.random() < 0.4) {
          addLog(`💀 ${p.name} karantinada hayatını kaybetti.`, 'danger');
          toRemoveQ.push(p.id);
        }
      } else {
        toRemoveQ.push(p.id);
        STATE.people.push({...p, location: 'barracks'});
        addLog(`✅ ${p.name} karantinayı geçti, barakalara katıldı.`, 'success');
      }
    }
  });
  STATE.quarantined = STATE.quarantined.filter(p => !toRemoveQ.includes(p.id));

  // Process social/mission/escape systems
  processSocialDay();
  processPregnancies();
  processMissions();
  processPrisonEscapes();
  processWorkshopProjects();
  processFarmCrops();
  processInfectionProgression();
  checkNightRaid();

  // Potential attacker raid bonus
  if ((STATE._potentialAttackers || 0) > 0 && Math.random() < STATE._potentialAttackers * 0.05) {
    STATE.nightRaid.raidStrength = (STATE.nightRaid.raidStrength || 0) + STATE._potentialAttackers * 2;
    addLog(`⚠️ Kovulan kişiler saldırıyı güçlendiriyor! (${STATE._potentialAttackers} potansiyel saldırgan)`, 'warning');
  }

  STATE.day++;
  STATE.activities.completedToday = [];

  // Show day end summary with food distribution
  showDayEndSummary(dayReport);

  updateUI();
  renderSocialTab();
}

// ---- Active task tick ----
function taskTick(dt) {
  if (!STATE.activities.activeTask) return;
  const task = STATE.activities.activeTask;
  task.elapsed = (task.elapsed || 0) + dt;
  const progress = Math.min(1, task.elapsed / task.duration);

  // Update banner
  const banner = document.getElementById('active-task-banner');
  banner.classList.add('show');
  const remaining = Math.max(0, task.duration - task.elapsed);
  const m = Math.floor(remaining / 60).toString().padStart(2,'0');
  const s = Math.floor(remaining % 60).toString().padStart(2,'0');
  document.getElementById('banner-text').textContent = '⚒ ' + task.name;
  document.getElementById('banner-fill').style.width = (progress * 100) + '%';
  document.getElementById('banner-time').textContent = m + ':' + s;

  if (progress >= 1) {
    completeTask(task);
    STATE.activities.activeTask = null;
    banner.classList.remove('show');
    renderActivities();
  }
}

function farmTick(dt) {
  STATE.farm.plots.forEach(plot => {
    if (!plot.crop || plot.ready) return;
    const elapsed = (Date.now() - plot.plantedAt) / 1000;
    const progress = elapsed / plot.crop.growTime;
    plot.stage = Math.min(2, Math.floor(progress * 3));
    if (progress >= 1) { plot.ready = true; plot.stage = 2; }
  });
}

function completeTask(task) {
  const def = ACTIVITIES.find(a => a.id === task.id);
  if (!def) return;
  let summary = [];

  const R = def.rewards;
  if (R.food) {
    const v = Array.isArray(R.food) ? randInt(...R.food) : R.food;
    STATE.resources.food = Math.max(0, STATE.resources.food + v);
    summary.push((v>0?'+':'')+v+'🍖');
  }
  if (R.parts) {
    const v = Array.isArray(R.parts) ? randInt(...R.parts) : R.parts;
    STATE.resources.parts = Math.max(0, STATE.resources.parts + v);
    summary.push((v>0?'+':'')+v+'🔧');
  }
  if (R.meds) {
    const v = Array.isArray(R.meds) ? randInt(...R.meds) : R.meds;
    STATE.resources.meds = Math.max(0, STATE.resources.meds + v);
    summary.push((v>0?'+':'')+v+'💊');
  }
  if (R.caps) {
    const v = Array.isArray(R.caps) ? randInt(...R.caps) : R.caps;
    STATE.resources.caps = Math.max(0, STATE.resources.caps + v);
    summary.push((v>0?'+':'')+v+'🪙');
  }
  if (R.energy) {
    const v = Array.isArray(R.energy) ? randInt(...R.energy) : R.energy;
    STATE.resources.energy = Math.max(0, STATE.resources.energy + v);
    summary.push((v>0?'+':'')+v+'🔋');
  }
  if (R.morale) { STATE.activities.morale = clamp(STATE.activities.morale + R.morale, 0, 100); summary.push('+'+ R.morale+'😊'); }
  if (R.defense_bonus) { STATE.base.upgrades.walls += 0; STATE.activities.trapBonus = (STATE.activities.trapBonus||0) + R.defense_bonus; summary.push('+Sav'); }
  if (R.traps) { STATE.activities.traps = (STATE.activities.traps||0) + 1; summary.push('+1🪤'); }
  if (R.survivor_bonus) {
    STATE.gate.timer = Math.min(STATE.gate.timer, 30);
    summary.push('Yayın gönderildi!');
  }
  if (R.threat_info) {
    const info = ['Batıda hareket yok', 'Kuzeyde küçük grup tespit edildi', 'Yakın tehdit görünmüyor', 'Doğuda zombi sürüsü yaklaşıyor!'];
    const msg = randFrom(info);
    summary.push('Gözetleme: ' + msg);
    if (msg.includes('zombi')) { showNotification('⚠️ TEHDİT: ' + msg, true); }
  }

  STATE.activities.completedToday.push(task.id);
  addLog(`✅ [${def.name}] tamamlandı: ${summary.join(' ')}`, 'success');
  showNotification('✅ ' + def.name + ' tamam! ' + summary.join(' '), false);
  updateUI();
}

function startActivity(id) {
  if (STATE.activities.activeTask) {
    showNotification('Önce mevcut görevi bitir!', true);
    return;
  }
  const def = ACTIVITIES.find(a => a.id === id);
  if (!def || !def.available()) return;

  // Deduct costs
  if (def.cost.energy) STATE.resources.energy = Math.max(0, STATE.resources.energy - def.cost.energy);
  if (def.cost.food) STATE.resources.food = Math.max(0, STATE.resources.food - def.cost.food);
  if (def.cost.parts) STATE.resources.parts = Math.max(0, STATE.resources.parts - def.cost.parts);

  STATE.activities.activeTask = { id, name: def.name, duration: def.duration, elapsed: 0 };
  addLog(`⚒ [${def.name}] başlatıldı.`, '');
  showNotification('⚒ ' + def.name + ' başladı', false);
  renderActivities();
  updateUI();
}

function renderActivities() {
  const el = document.getElementById('activity-list');
  if (!el) return;

  el.innerHTML = ACTIVITIES.map(act => {
    const isActive = STATE.activities.activeTask?.id === act.id;
    const isAvailable = act.available();
    const lockedClass = !isAvailable ? 'locked' : '';
    const activeClass = isActive ? 'active-task' : '';

    const progress = isActive ? (STATE.activities.activeTask.elapsed / act.duration) : 0;
    const remaining = isActive ? Math.max(0, act.duration - STATE.activities.activeTask.elapsed) : act.duration;
    const m = Math.floor(remaining/60).toString().padStart(2,'0');
    const s = Math.floor(remaining%60).toString().padStart(2,'0');

    const costStr = Object.entries(act.cost).map(([k,v]) => {
      const icons = {food:'🍖',parts:'🔧',energy:'🔋',meds:'💊',caps:'🪙'};
      return `<span class="reward-chip neg">${icons[k]||k} -${v}</span>`;
    }).join('');

    const rewardStr = act.rewardText.map((t,i) => `<span class="reward-chip ${act.rewardColor[i]}">${t}</span>`).join('');

    return `
      <div class="activity-card ${lockedClass} ${activeClass}" onclick="${isAvailable && !STATE.activities.activeTask ? `startActivity('${act.id}')` : ''}">
        <div class="act-header">
          <span class="act-icon">${act.icon}</span>
          <span class="act-name">${act.name}</span>
          <span class="act-badge ${isActive ? 'amber' : ''}">${isActive ? 'AKTİF' : m+':'+s}</span>
        </div>
        <div class="act-desc">${act.desc}</div>
        <div class="act-rewards">${costStr}${rewardStr}</div>
        ${isActive ? `
          <div class="task-progress-wrap"><div class="task-progress-fill" style="width:${progress*100}%"></div></div>
          <div class="task-time-left">${m}:${s} kaldı</div>
        ` : ''}
      </div>
    `;
  }).join('');

  renderFarm();
}

// FARM
function renderFarm() {
  const el = document.getElementById('farm-section');
  if (!el) return;
  const plots = STATE.farm.plots;

  el.innerHTML = `
    <div style="font-size:10px; color:var(--text-dim); margin-bottom:6px; line-height:1.6;">
      Tarla oluştur, ürün yetiştir. Ekin zamanla büyür, hazır olunca topla.
    </div>
    <div class="farm-grid">
      ${plots.map((plot, i) => {
        const unlocked = i < STATE.farm.unlocked;
        if (!unlocked) {
          return `<div class="farm-plot locked" style="opacity:0.3;font-size:14px;" onclick="unlockPlot(${i})">🔒<div class="plot-label">KİLİTLİ</div></div>`;
        }
        if (!plot.crop) {
          return `<div class="farm-plot empty" onclick="showPlantModal(${i})">➕<div class="plot-label">BOŞ TARLA</div></div>`;
        }
        const stageIcon = plot.crop.stages[plot.stage] || plot.crop.icon;
        const pct = plot.ready ? 100 : Math.min(99, Math.round(((Date.now() - plot.plantedAt)/1000) / plot.crop.growTime * 100));
        if (plot.ready) {
          return `<div class="farm-plot ready" onclick="harvestPlot(${i})">${stageIcon}<div class="plot-label">HASAT ET!</div></div>`;
        }
        return `<div class="farm-plot growing">
          ${stageIcon}
          <div class="plot-label">${plot.crop.name}</div>
          <div class="plot-stage">%${pct}</div>
        </div>`;
      }).join('')}
    </div>
    ${STATE.farm.unlocked < 6 ? `<div style="margin-top:8px;font-size:10px;color:var(--text-dim);">🔒 ${6-STATE.farm.unlocked} tarla daha açılabilir (Geliştirmeler)</div>` : ''}
  `;
}

function showPlantModal(plotIdx) {
  const body = `
    <div style="font-size:11px; color:var(--text-dim); margin-bottom:12px; letter-spacing:1px;">Hangi ürünü ekmek istiyorsun?</div>
    ${CROPS.map(crop => `
      <div class="activity-card" onclick="plantCrop(${plotIdx},'${crop.id}')" style="margin-bottom:8px;">
        <div class="act-header">
          <span class="act-icon">${crop.icon}</span>
          <span class="act-name">${crop.name}</span>
          <span class="act-badge">${Math.floor(crop.growTime/60)}dk büyüme</span>
        </div>
        <div class="act-rewards">
          <span class="reward-chip pos">+${crop.yield[0]}-${crop.yield[1]} ${crop.isMed ? '💊' : '🍖'}</span>
        </div>
      </div>
    `).join('')}
  `;
  document.getElementById('modal-title').textContent = 'EKIM YAP';
  document.getElementById('modal-subtitle').textContent = 'TARLA #' + (plotIdx + 1);
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('show');
}

function plantCrop(plotIdx, cropId) {
  const crop = CROPS.find(c => c.id === cropId);
  if (!crop) return;
  STATE.farm.plots[plotIdx] = { crop, plantedAt: Date.now(), stage: 0, ready: false };
  addLog(`🌱 Tarla #${plotIdx+1}: ${crop.name} ekildi.`, 'success');
  closeModal();
  renderActivities();
}

function harvestPlot(plotIdx) {
  const plot = STATE.farm.plots[plotIdx];
  if (!plot.ready) return;
  const amount = randInt(...plot.crop.yield);
  if (plot.crop.isMed) {
    STATE.resources.meds += amount;
    addLog(`🌿 Tarla #${plotIdx+1} hasat: +${amount} İlaç`, 'success');
    showNotification(`💊 Hasat: +${amount} İlaç`, false);
  } else {
    STATE.resources.food += amount;
    addLog(`${plot.crop.icon} Tarla #${plotIdx+1} hasat: +${amount} Yiyecek`, 'success');
    showNotification(`🍖 Hasat: +${amount} Yiyecek`, false);
  }
  STATE.farm.plots[plotIdx] = { crop: null, plantedAt: null, stage: 0, ready: false };
  updateUI();
  renderActivities();
}

function unlockPlot(i) {
  showNotification('Geliştirmeler menüsünden tarla aç!', false);
}


// ==================== SOCIAL & RELATIONSHIP SYSTEM ====================
STATE.social = {
  relationships: [],     // { id, personA, personB, type: 'love'|'friend'|'enemy'|'tension'|'family'|'married', strength: 0-100 }
  morale: 50,            // base morale 0-100
  tensionLevel: 0,       // 0-100, triggers events
  civilWarRisk: 0,       // 0-100
  alerts: [],            // pending social alerts { id, msg, type, actionFn }
  pregnancies: [],       // { motherId, fatherId, daysLeft }
};

STATE.missions = {
  active: [],    // ongoing missions
  available: [], // generated missions
  completed: [],
};

STATE.nightRaid = {
  pending: false,
  raidStrength: 0,
  countdown: null,
};

// ==================== RELATIONSHIP ENGINE ====================
function getRelationship(idA, idB) {
  return STATE.social.relationships.find(r =>
    (r.personA === idA && r.personB === idB) ||
    (r.personA === idB && r.personB === idA)
  );
}

function setRelationship(idA, idB, type, strength) {
  let rel = getRelationship(idA, idB);
  if (rel) { rel.type = type; rel.strength = clamp(strength, 0, 100); }
  else STATE.social.relationships.push({ id: Date.now()+Math.random(), personA: idA, personB: idB, type, strength: clamp(strength,0,100) });
}

function removeRelationship(idA, idB) {
  STATE.social.relationships = STATE.social.relationships.filter(r =>
    !((r.personA === idA && r.personB === idB) || (r.personA === idB && r.personB === idA))
  );
}

function getAllPeopleInBase() {
  return [...STATE.people, ...STATE.quarantined, ...STATE.imprisoned];
}

function getPersonById(id) {
  return getAllPeopleInBase().find(p => String(p.id) === String(id));
}

// Called each day — generates social events
function processSocialDay() {
  const people = STATE.people; // only free people interact
  if (people.length < 2) return;

  // 1. RANDOM RELATIONSHIP EVENTS
  for (let i = 0; i < Math.min(3, people.length); i++) {
    const a = randFrom(people);
    const b = randFrom(people.filter(p => p.id !== a.id));
    if (!b) continue;

    const existing = getRelationship(a.id, b.id);
    const ageCompatible = Math.abs(a.age - b.age) <= 15;
    const genderCompatible = a.male !== b.male;
    const bothAdult = !a.isChild && !b.isChild;
    const bothSingle = !a.partnerId && !b.partnerId && !a.spouseId && !b.spouseId;

    // Friendship formation
    if (!existing && Math.random() < 0.25) {
      setRelationship(a.id, b.id, 'friend', randInt(20,50));
      if (Math.random() < 0.4) addLog(`${a.name} ve ${b.name} arkadaş oldu.`, 'success');
    }

    // Romance formation
    if (!existing && genderCompatible && ageCompatible && bothAdult && bothSingle && Math.random() < 0.15) {
      setRelationship(a.id, b.id, 'love', randInt(30,60));
      a.partnerId = b.id; b.partnerId = a.id;
      addLog(`💕 ${a.name} ve ${b.name} birbirine ilgi duymaya başladı!`, 'success');
      addSocialAlert(`💕 ${a.name} & ${b.name} arasında romantik bir yakınlaşma var!`, 'romance', null);
    }

    // Existing relationship progression
    if (existing) {
      if (existing.type === 'love') {
        existing.strength = clamp(existing.strength + randInt(-5, 10), 0, 100);

        // Breakup
        if (existing.strength < 15 && Math.random() < 0.4) {
          const pa = getPersonById(existing.personA);
          const pb = getPersonById(existing.personB);
          if (pa) pa.partnerId = null;
          if (pb) pb.partnerId = null;
          removeRelationship(existing.personA, existing.personB);
          addLog(`💔 ${pa?.name||'?'} ve ${pb?.name||'?'} ayrıldı.`, 'warning');
          // May become enemies
          if (Math.random() < 0.35) {
            setRelationship(existing.personA, existing.personB, 'enemy', randInt(40,70));
            if (pa) pa.enemyIds = [...(pa.enemyIds||[]), existing.personB];
            if (pb) pb.enemyIds = [...(pb.enemyIds||[]), existing.personA];
            addLog(`😡 Ayrılık sonrası ${pa?.name||'?'} ve ${pb?.name||'?'} düşman oldu!`, 'danger');
          }
          return;
        }

        // Marriage
        if (existing.strength >= 80 && bothAdult && !a.spouseId && !b.spouseId && Math.random() < 0.2) {
          a.spouseId = b.id; b.spouseId = a.id;
          a.partnerId = b.id; b.partnerId = a.id;
          setRelationship(a.id, b.id, 'married', 90);
          addLog(`💍 ${a.name} ve ${b.name} evlendi! Üste ilk aile kuruldu.`, 'success');
          addSocialAlert(`💍 ${a.name} & ${b.name} evlenmek istiyor! Onaylıyor musunuz?`, 'marriage', () => {
            showNotification('Evlilik kutlandı! +10 Moral', false);
            STATE.social.morale = clamp(STATE.social.morale + 10, 0, 100);
          });
          return;
        }

        // Pregnancy
        if (existing.strength >= 60 && a.spouseId === b.id && !STATE.social.pregnancies.find(p => p.motherId === (a.male ? b.id : a.id)) && Math.random() < 0.2) {
          const mother = a.male ? b : a;
          const father = a.male ? a : b;
          if (mother && father && !mother.isChild) {
            STATE.social.pregnancies.push({ motherId: mother.id, fatherId: father.id, daysLeft: 7 });
            mother.trait = 'HAMİLE';
            addLog(`🍼 ${mother.name} hamile! ${father.name} baba olacak.`, 'success');
            addSocialAlert(`🍼 ${mother.name} hamile! Klinik & kaynaklar hazır mı?`, 'pregnancy', null);
          }
        }
      }

      // Friend -> tension from overcrowding
      if (existing.type === 'friend' && STATE.people.length >= STATE.base.maxPop * 0.8) {
        if (Math.random() < 0.1) {
          existing.type = 'tension';
          addLog(`😤 ${a.name} ile ${b.name} arasında gerginlik başladı.`, 'warning');
        }
      }

      // Tension -> conflict
      if (existing.type === 'tension') {
        existing.strength = clamp(existing.strength + randInt(5, 15), 0, 100);
        STATE.social.tensionLevel = clamp(STATE.social.tensionLevel + 5, 0, 100);
        if (existing.strength >= 70 && Math.random() < 0.3) {
          setRelationship(a.id, b.id, 'enemy', existing.strength);
          addLog(`⚔️ ${a.name} ile ${b.name} kavga etti! Her ikisi de yaralandı.`, 'danger');
          a.health = clamp(a.health - randInt(5,15), 0, 100);
          b.health = clamp(b.health - randInt(5,15), 0, 100);
          addSocialAlert(`⚔️ Kavga: ${a.name} vs ${b.name}! Müdahale et!`, 'conflict', () => resolveConflict(a.id, b.id));
        }
      }

      // Enemy -> morale drain
      if (existing.type === 'enemy') {
        STATE.social.tensionLevel = clamp(STATE.social.tensionLevel + 8, 0, 100);
        STATE.social.morale = clamp(STATE.social.morale - 2, 0, 100);
      }
    }
  }

  // 2. OVERCROWDING TENSION
  const crowdRatio = STATE.people.length / Math.max(1, STATE.base.maxPop);
  if (crowdRatio >= 0.9) {
    STATE.social.tensionLevel = clamp(STATE.social.tensionLevel + 10, 0, 100);
    if (Math.random() < 0.3) addSocialAlert('😤 ÜS KALABALIKLAŞıYOR! İnsanlar huzursuz.', 'crowding', null);
  }

  // 3. PRISON OVERCROWDING -> REVOLT RISK
  const guards = STATE.people.filter(p => p.trait === 'ASKER' || p.trait === 'GÜVENLİK').length;
  if (STATE.imprisoned.length > guards * 2 + 1) {
    STATE.social.tensionLevel = clamp(STATE.social.tensionLevel + 20, 0, 100);
    addSocialAlert('⚠️ HAPISHANEDE GÜVENLİK YETERSİZ! İsyan riski var!', 'prisonrisk', () => startPrisonRevolt());
    addLog('⚠️ Hücrelerde güvenlik açığı! Muhafız sayısı yetersiz.', 'danger');
  }

  // 4. CIVIL WAR RISK
  const enemies = STATE.social.relationships.filter(r => r.type === 'enemy').length;
  STATE.social.civilWarRisk = clamp(
    STATE.social.tensionLevel * 0.5 + enemies * 5 - STATE.social.morale * 0.3,
    0, 100
  );
  if (STATE.social.civilWarRisk >= 80) {
    addSocialAlert('🔥 İÇ SAVAŞ KAPIDA! Gerilim kritik seviyede!', 'civilwar', () => showCivilWarModal());
    addLog('🔥 UYARI: İç çatışma riski kritik seviyeye ulaştı!', 'danger');
  }

  // 5. DISEASE SPREAD FROM CLINIC OVERFLOW
  const doctors = STATE.people.filter(p => p.trait === 'DOKTOR').length;
  const nurses = STATE.people.filter(p => p.trait === 'TIP' || p.trait === 'HEMŞİRE').length;
  const sickPeople = getAllPeopleInBase().filter(p => p.infected || p.health < 30).length;
  const clinicCapacity = STATE.base.upgrades.clinic ? (doctors * 3 + nurses * 2 + 2) : 1;

  if (sickPeople > clinicCapacity) {
    // Disease spreads to healthy people
    const healthyPeople = STATE.people.filter(p => !p.infected && p.health > 50);
    if (healthyPeople.length > 0 && Math.random() < 0.4) {
      const victim = randFrom(healthyPeople);
      victim.infected = true;
      victim.health = clamp(victim.health - 20, 0, 100);
      addLog(`🦠 Hastane kapasitesi aşıldı! ${victim.name} hastalandı ve enfeksiyon yayıldı!`, 'danger');
      addSocialAlert(`🦠 Klinik kapasitesi aşıldı! Hastalık yayılıyor!`, 'epidemic', null);
      STATE.social.morale = clamp(STATE.social.morale - 10, 0, 100);
    }
  }

  // 6. MORALE RECOVERY
  if (STATE.social.tensionLevel < 30 && Math.random() < 0.3) {
    STATE.social.morale = clamp(STATE.social.morale + 3, 0, 100);
  }

  renderSocialTab();
}

function addSocialAlert(msg, type, actionFn) {
  const alert = { id: Date.now() + Math.random(), msg, type, actionFn };
  STATE.social.alerts.unshift(alert);
  if (STATE.social.alerts.length > 8) STATE.social.alerts.pop();
  renderSocialTab();
  showNotification('⚠️ ' + msg.substring(0,40), type === 'conflict' || type === 'epidemic' || type === 'civilwar');
}

function dismissSocialAlert(id) {
  const alert = STATE.social.alerts.find(a => a.id == id);
  if (alert && alert.actionFn) alert.actionFn();
  STATE.social.alerts = STATE.social.alerts.filter(a => a.id != id);
  renderSocialTab();
}

function resolveConflict(idA, idB) {
  const a = getPersonById(idA), b = getPersonById(idB);
  // Mediation costs morale but reduces tension
  STATE.social.tensionLevel = clamp(STATE.social.tensionLevel - 20, 0, 100);
  const rel = getRelationship(idA, idB);
  if (rel) rel.type = 'tension';
  addLog(`🕊️ ${a?.name||'?'} ile ${b?.name||'?'} arasındaki çatışma yatıştırıldı.`, 'success');
  showNotification('Çatışma çözüldü, gerilim düştü', false);
}

function startPrisonRevolt() {
  const prisoner = randFrom(STATE.imprisoned);
  if (!prisoner) return;
  // Prisoner escapes and becomes enemy
  STATE.imprisoned = STATE.imprisoned.filter(p => p.id !== prisoner.id);
  prisoner.location = 'barracks';
  prisoner.suspicious = true;
  prisoner.danger = 80;
  STATE.people.push(prisoner);
  addLog(`💥 İSYAN! ${prisoner.name} hücreden kaçtı ve üste saldırdı!`, 'danger');
  STATE.people.forEach(p => { if (Math.random() < 0.3) p.health = clamp(p.health - randInt(10,25), 0, 100); });
  STATE.resources.food = Math.max(0, STATE.resources.food - randInt(5, 15));
  showNotification('💥 HAPISHANE İSYANI!', true);
}

function showCivilWarModal() {
  const body = `
    <div style="color:var(--red);font-family:'Oswald',sans-serif;font-size:14px;margin-bottom:12px;letter-spacing:2px;">
      ⚠️ İÇ ÇATIŞMA RİSKİ KRİTİK SEVİYEDE
    </div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:12px;line-height:1.8;">
      Üsteki gerilim kontrolden çıkma noktasına geldi. Bir şeyler yapmazsan gruplar birbirine girecek.
    </div>
    <div class="decision-grid">
      <button class="decision-btn accept" onclick="pacifyBase();closeModal()">
        <span class="d-icon">🕊️</span>
        UZLAŞTIR<br><span style="font-size:9px">-10 Yiyecek, -5 Parça</span>
      </button>
      <button class="decision-btn prison" onclick="isolateLeaders();closeModal()">
        <span class="d-icon">🔒</span>
        LİDERLERİ KİLİTLE<br><span style="font-size:9px">Gerilim azalır</span>
      </button>
      <button class="decision-btn execute" onclick="closedModal()">
        <span class="d-icon">💀</span>
        MÜDAHALE ETME<br><span style="font-size:9px">Risk: İç savaş</span>
      </button>
    </div>
  `;
  document.getElementById('modal-title').textContent = 'İÇ ÇATIŞMA TEHDİDİ';
  document.getElementById('modal-subtitle').textContent = `GERİLİM: ${Math.floor(STATE.social.civilWarRisk)}%`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('show');
}

function pacifyBase() {
  STATE.resources.food = Math.max(0, STATE.resources.food - 10);
  STATE.resources.parts = Math.max(0, STATE.resources.parts - 5);
  STATE.social.tensionLevel = clamp(STATE.social.tensionLevel - 35, 0, 100);
  STATE.social.morale = clamp(STATE.social.morale + 20, 0, 100);
  STATE.social.civilWarRisk = 0;
  // Convert some enemy relationships to neutral
  STATE.social.relationships.filter(r => r.type === 'enemy').forEach(r => {
    if (Math.random() < 0.5) r.type = 'tension';
  });
  addLog('🕊️ Yönetici araya girdi! Gerilim hafifledi, barış sağlandı.', 'success');
  renderSocialTab();
}

function isolateLeaders() {
  const aggressors = STATE.people.filter(p => p.personality === 'SALDIRGAN').slice(0,2);
  aggressors.forEach(p => {
    STATE.people = STATE.people.filter(x => x.id !== p.id);
    p.location = 'prison';
    STATE.imprisoned.push(p);
    addLog(`🔒 ${p.name} izole edildi.`, 'warning');
  });
  STATE.social.tensionLevel = clamp(STATE.social.tensionLevel - 25, 0, 100);
  updateUI();
}

// Pregnancy progression
function processPregnancies() {
  STATE.social.pregnancies.forEach((preg, idx) => {
    preg.daysLeft--;
    if (preg.daysLeft <= 0) {
      const mother = getPersonById(preg.motherId);
      if (mother) {
        // Check clinic for safe delivery
        const hasMed = STATE.base.upgrades.clinic && STATE.resources.meds >= 3;
        if (!hasMed) {
          // Risky birth
          if (Math.random() < 0.3) {
            addLog(`💀 ${mother.name} doğumda yaşamını yitirdi. Klinik yoktu.`, 'danger');
            // Remove mother
            STATE.people = STATE.people.filter(p => p.id !== mother.id);
          } else {
            mother.trait = randFrom(['DOKTOR','ASKER','MÜHENDİS','ÇIFTÇI']);
            mother.health = clamp(mother.health - 20, 10, 100);
            addLog(`⚠️ ${mother.name} doğum yaptı ama klinik yoktu. Riskli geçti.`, 'warning');
          }
        } else {
          STATE.resources.meds -= 3;
          mother.trait = randFrom(['DOKTOR','ASKER','MÜHENDİS','ÇIFTÇI']);
          addLog(`🍼 ${mother.name} sağlıklı doğum yaptı!`, 'success');
        }

        // Create child
        const childNames = ['Asya','Arda','Ela','Can','Nil','Ada','Berk','Su','Toprak'];
        const childMale = Math.random() > 0.5;
        const child = {
          id: Date.now() + Math.random(),
          name: randFrom(childNames),
          emoji: childMale ? '👦' : '👧',
          trait: 'ÇOCUk', health: 80, infected: false, suspicious: false, danger: 0,
          skills: { combat: 5, medical: 5, engineering: 5, farming: 5, morale: 80 },
          items: [], foodNeeded: 0.5, male: childMale, age: 0,
          personality: 'NEŞELİ',
          location: 'barracks', daysInBase: 0, happiness: 90,
          partnerId: null, spouseId: null, childrenIds: [], pregnantDays: 0,
          enemyIds: [], friendIds: [], onMission: null, isChild: true,
        };
        STATE.people.push(child);
        if (mother) {
          mother.childrenIds = [...(mother.childrenIds||[]), child.id];
          const father = getPersonById(preg.fatherId);
          if (father) father.childrenIds = [...(father.childrenIds||[]), child.id];
          // Family relationship
          setRelationship(mother.id, child.id, 'family', 95);
          if (father) setRelationship(father.id, child.id, 'family', 95);
        }

  { id: 'medical_run', icon: '💊', name: 'İlaç Baskını', desc: 'Eski hastaneyi ara. Tıbbi malzeme bul.', duration: 1, minPeople: 1, rewards: { meds: [10,20], food: [2,6] }, risk: 0.25 },
  { id: 'recon', icon: '🔭', name: 'Keşif Görevi', desc: 'Çevreyi keşfet, tehdit bilgisi topla.', duration: 1, minPeople: 1, rewards: { caps: [8,15], energy: [5,10] }, risk: 0.15 },
  { id: 'weapon_cache', icon: '🗡️', name: 'Silah Deposu', desc: 'Eski askeri üste silah ve parça ara.', duration: 3, minPeople: 3, rewards: { parts: [15,30], caps: [10,20] }, risk: 0.5 },
  { id: 'farm_expansion', icon: '🌾', name: 'Tarım Alanı', desc: 'Yakın çiftliği güvenli hale getir.', duration: 2, minPeople: 2, rewards: { food: [20,40] }, risk: 0.2 },
  { id: 'rescue_op', icon: '🚑', name: 'Kurtarma Operasyonu', desc: 'Sinyali yakalanan bir survivor grubu var.', duration: 2, minPeople: 2, rewards: { food: [5,10], meds: [3,8] }, risk: 0.3, givesSurvivor: true },
];

function generateMissions() {
  const available = [];
  const count = randInt(2, 4);
  const shuffled = [...MISSION_TEMPLATES].sort(() => Math.random()-0.5);
  for (let i = 0; i < count; i++) {
    const t = shuffled[i % shuffled.length];
    available.push({ ...t, instanceId: Date.now() + i, assignedPeople: [] });
  }
  STATE.missions.available = available;
  renderMissions();
}

function showMissionDetail(instanceId) {
  const mission = STATE.missions.available.find(m => m.instanceId == instanceId)

    <div style="font-size:36px;text-align:center;margin-bottom:8px;">${mission.icon}</div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:12px;">${mission.desc}</div>

    <div class="stat-row"><span class="stat-label">RİSK</span><span class="stat-value" style="color:var(--${mission.risk>0.4?'red':mission.risk>0.2?'amber':'green'})">${Math.floor(mission.risk*100)}%</span></div>
    ${isActive ? `<div class="stat-row"><span class="stat-label">KALAN</span><span class="stat-value">${mission.daysLeft} gün</span></div>` : ''}

    ${!isActive ? `
    <div class="section-divider">GÖREV EKIBI SEÇ</div>
    <div id="mission-crew-select" style="max-height:150px;overflow-y:auto;">
      ${freePeople.length === 0
        ? '<div style="font-size:10px;color:var(--text-dim);">Görevlendirilecek uygun kişi yok.</div>'
        : freePeople.map(p => `
          <div class="person-rel-row" onclick="toggleMissionAssign(${instanceId}, ${p.id}, this)">
            <span style="font-size:16px">${p.emoji}</span>
            <span class="pname">${p.name}</span>
            <span class="pstatus">${p.trait} · Savaş:${p.skills.combat}</span>
            <span id="assign-${instanceId}-${p.id}" style="font-size:12px;color:var(--text-dim)">⬜</span>
